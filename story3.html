<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>万里求法 · 玄奘西行</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
  :root {
    --bg: #0f0d0c; --card-bg: rgba(24,20,18,0.93); --accent: #c47a38;
    --text: #e8e0d8; --text-dim: #9b9085; --border: rgba(255,255,255,0.08);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background: #000; font-family: -apple-system, "PingFang SC", "Noto Serif SC", "Microsoft YaHei", serif; overflow: hidden; height: 100vh; }

  #map { position: fixed; inset: 0; z-index: 1; }
  .leaflet-container { background: #0f0d0c; }

  /* ── Story Nav ── */
  #story-nav {
    position: fixed; top: 24px; left: 50%; transform: translateX(-50%);
    z-index: 10; display: flex; gap: 0; font-size: 0.73rem;
  }
  #story-nav a {
    padding: 4px 12px; text-decoration: none; color: var(--text-dim);
    border: 1px solid var(--border); background: rgba(0,0,0,0.3);
    transition: all 0.2s; white-space: nowrap;
  }
  #story-nav a:first-child { border-radius: 14px 0 0 14px; }
  #story-nav a:last-child { border-radius: 0 14px 14px 0; }
  #story-nav a.active { color: var(--accent); border-color: var(--accent); background: rgba(196,122,56,0.1); }
  #story-nav a:hover:not(.active) { color: #fff; background: rgba(255,255,255,0.06); }

  /* ── Narrative Card ── */
  #narrative {
    position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%);
    z-index: 10; width: min(92vw, 620px);
    background: var(--card-bg); border: 1px solid var(--border);
    border-radius: 20px; padding: 32px 36px 28px;
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    box-shadow: 0 8px 48px rgba(0,0,0,0.5);
    transition: opacity 0.5s, transform 0.5s;
    cursor: pointer; user-select: none;
  }
  #narrative.fading { opacity: 0; transform: translateX(-50%) translateY(20px); }
  #narrative.collapsed { padding: 12px 24px; }
  #narrative.collapsed p,
  #narrative.collapsed #badges { display: none; }
  #narrative.collapsed h2 { font-size: 0.95rem; margin-bottom: 0; }
  #narrative.collapsed .chapter-num { margin-bottom: 0; }
  #narrative.collapsed .hint { margin-top: 0; margin-left: 12px; display: inline-flex; }
  #toggle-card {
    position: absolute; top: 10px; right: 16px;
    background: none; border: none; color: var(--text-dim);
    font-size: 1.1rem; cursor: pointer; z-index: 2; padding: 2px 8px;
    line-height: 1; transition: color 0.2s;
  }
  #toggle-card:hover { color: #fff; }
  #narrative.collapsed #toggle-card { top: 50%; transform: translateY(-50%); }
  #narrative .chapter-num {
    font-size: 0.7rem; letter-spacing: 0.2em; color: var(--accent);
    text-transform: uppercase; margin-bottom: 6px;
  }
  #narrative h2 {
    font-size: 1.5rem; font-weight: 700; color: #fff;
    margin-bottom: 12px; letter-spacing: 0.04em; line-height: 1.4;
  }
  #narrative p {
    font-size: 1rem; line-height: 1.85; color: var(--text);
    margin-bottom: 6px;
  }
  #narrative .hint {
    margin-top: 18px; font-size: 0.78rem; color: var(--text-dim);
    display: flex; align-items: center; gap: 8px;
  }
  #narrative .hint .arrow { animation: bounce 1.2s infinite; }
  @keyframes bounce { 0%,100%{transform:translateX(0)} 50%{transform:translateX(6px)} }

  /* ── Progress Dots ── */
  #progress {
    position: fixed; top: 60px; left: 50%; transform: translateX(-50%);
    z-index: 10; display: flex; gap: 10px;
  }
  #progress .dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: rgba(255,255,255,0.2); transition: all 0.4s;
  }
  #progress .dot.active { background: var(--accent); transform: scale(1.4); }
  #progress .dot.done { background: rgba(196,122,56,0.5); }

  /* ── Nav buttons ── */
  #restart {
    position: fixed; top: 24px; right: 24px; z-index: 10;
    background: rgba(255,255,255,0.06); border: 1px solid var(--border);
    color: var(--text-dim); padding: 8px 16px; border-radius: 20px;
    font-size: 0.78rem; cursor: pointer; transition: all 0.3s;
  }
  #restart:hover { background: rgba(255,255,255,0.12); color: #fff; }

  @media (max-width: 640px) {
    #narrative { bottom: 16px; padding: 24px 20px 20px; border-radius: 16px; }
    #narrative h2 { font-size: 1.2rem; }
    #narrative p { font-size: 0.9rem; }
    #story-nav a { padding: 3px 9px; font-size: 0.68rem; }
  }
</style>
</head>
<body>

<div id="map"></div>

<div id="story-nav">
  <a href="story.html">📖 张骞</a>
  <a href="story3.html" class="active">🧘 玄奘</a>
  <a href="story2.html">🚢 郑和</a>
</div>

<div id="progress"></div>

<button id="restart" onclick="restart()">🔄 重播</button>

<div id="narrative" onclick="advance()">
  <button id="toggle-card" onclick="event.stopPropagation();toggleCard()" title="收起/展开">─</button>
  <div class="chapter-num" id="chNum"></div>
  <h2 id="chTitle"></h2>
  <p id="chBody"></p>
  <div id="badges" style="margin:8px 0 0;line-height:1.8"></div>
  <div class="hint"><span class="arrow">→</span> 点击继续</div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const STORY = [
  {
    title: '万里求法',
    subtitle: '公元629年 · 长安',
    body: '贞观三年，27岁的玄奘从长安出发。唐初严禁百姓出境，他只能混在难民中偷渡西行。经秦州、兰州到凉州，一路讲经声名鹊起，引得凉州都督下令捉拿。玄奘昼伏夜出逃至瓜州，找到胡人向导石盘陀。夜渡葫芦河，偷越玉门关，独自踏入八百里莫贺延碛——「上无飞鸟，下无走兽」。四天五夜滴水未进，靠老马识途找到水源才活下来。',
    lat: 38.0, lng: 102.0, zoom: 5,
    route: ['changan', 'dunhuang'],
    marker: 'dunhuang',
    showCities: ['changan', 'dunhuang', 'luoyang'],
    highlight: ['xuanzang', 'xuanzang-journey', 'buddhism']
  },
  {
    title: '高昌绝食',
    subtitle: '高昌国 · 吐鲁番',
    body: '走出沙漠，玄奘抵达西域佛国高昌。国王麴文泰深夜秉烛前来，深为玄奘的学识和虔诚折服，要强行留他为国师。玄奘说：「骨可碎，志不可夺。」绝食三日，气息奄奄。麴文泰终于让步，跪地结拜为兄弟，派二十五名随从、三十匹马、足够二十年的盘缠，并修国书给沿途二十四国请予放行。玄奘许诺归国时在此停留三年说法——十七年后，他兑现了诺言。',
    lat: 42.0, lng: 89.5, zoom: 5.5,
    route: ['dunhuang', 'gaochang'],
    marker: 'gaochang',
    showCities: ['dunhuang', 'gaochang', 'kucha'],
    highlight: ['xuanzang', 'gaochang', 'buddhism']
  },
  {
    title: '翻越凌山',
    subtitle: '天山 · 碎叶城',
    body: '从高昌经龟兹，玄奘面对西行最险恶的屏障——凌山（天山主峰）。「积雪弥满，蹊径难寻。飞雪雨下，七日七夜方出。」同行者冻死十之三四，牲畜损失过半。下山后抵达碎叶城（今吉尔吉斯斯坦托克马克），遇见西突厥统叶护可汗。可汗派翻译和护送队，玄奘经赭时国（塔什干）、飒秣建国（撒马尔罕），穿越中亚腹地，一路向印度前进。',
    lat: 42.0, lng: 75.5, zoom: 5,
    route: ['gaochang', 'kucha', 'suyab', 'samarkand'],
    marker: 'suyab',
    showCities: ['gaochang', 'kucha', 'suyab', 'samarkand'],
    highlight: ['xuanzang', 'suyab', 'buddhism']
  },
  {
    title: '犍陀罗·佛的容颜',
    subtitle: '塔克西拉 · 犍陀罗故地',
    body: '穿越铁门关，翻越大雪山（兴都库什山），玄奘进入古印度犍陀罗（今巴基斯坦）。这里是佛教艺术的诞生地——亚历山大的希腊雕塑匠与印度佛教信仰在此交融，创造出最早的佛像。玄奘遍访圣迹：佛陀割肉贸鸽处、舍身饲虎处、菩提树下金刚座。每到一处，虔诚礼拜，泪流满面。同行者劝他，「法师为何如此？」他答：「佛在此地为众生舍身，我今礼拜，岂能无泪。」',
    lat: 34.0, lng: 73.0, zoom: 5.5,
    route: ['samarkand', 'taxila'],
    marker: 'taxila',
    showCities: ['samarkand', 'taxila', 'kashgar'],
    highlight: ['xuanzang', 'buddhism', 'kumarajiva']
  },
  {
    title: '那烂陀·智慧的海洋',
    subtitle: '印度 · 那烂陀寺',
    body: '公元631年，玄奘终于抵达那烂陀寺——当时世界最大的佛教学府，万余僧侣在此研习。106岁的住持戒贤法师亲自收他为徒，传授《瑜伽师地论》。玄奘在此苦学五年，遍览经论，通晓梵文，学贯大小乘。他还游历了整个印度，造访佛教六大圣地，观察各地风俗——从甘蔗制糖到刑罚制度，从服饰饮食到语言文字，巨细无遗地记录。从长安至此，他已走过138个国家。',
    lat: 25.6, lng: 85.2, zoom: 6,
    route: null,
    marker: null,
    showCities: ['taxila'],
    highlight: ['xuanzang', 'buddhism', 'xuanzang-journey']
  },
  {
    title: '曲女城·天竺之辩',
    subtitle: '曲女城 · 戒日王宫廷',
    body: '戒日王在曲女城为玄奘举办「无遮大会」——全印度学术辩论会。到会者：十八位国王、三千高僧、两千婆罗门及外道学者。玄奘立《制恶见论》悬于会场门外，宣称：「若有一字无理，请斩首相谢。」整整十八天，无人能破一字。大乘众尊他为「大乘天」，小乘众尊他为「解脱天」。此后戒日王三请玄奘留印度，他一一谢绝：「我此来为求法，今法已得，当归以报国。」',
    lat: 27.0, lng: 80.0, zoom: 5.5,
    route: null,
    marker: null,
    showCities: ['taxila'],
    highlight: ['xuanzang', 'buddhism']
  },
  {
    title: '归国·一灯照千年',
    subtitle: '公元645年 · 长安',
    body: '阔别十七年，玄奘回到长安。带回佛经657部、佛像七尊、舍利一百五十粒。长安万人空巷，争睹圣僧归来。玄奘谢绝了唐太宗出仕的邀请，隐居大慈恩寺译经十九年，共译出《大般若经》等七十五部一千三百三十五卷。又口述《大唐西域记》——记录138个国家和地区的地理、历史、风俗，至今仍是研究古印度和中亚学术上不可替代的第一手资料。664年圆寂，百万人送葬。他取回来的不仅是佛经，更是一整个文明的光。',
    lat: 34.26, lng: 108.94, zoom: 5,
    route: null,
    marker: 'changan',
    showCities: ['changan', 'luoyang', 'dunhuang', 'gaochang', 'taxila'],
    highlight: ['xuanzang', 'xuanzang-journey', 'buddhism', 'changan']
  }
];

const TOTAL = STORY.length;

const map = L.map('map', {
  zoomControl: false, attributionControl: false,
  center: [35, 85], zoom: 3.5
});
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  maxZoom: 12
}).addTo(map);

let DATA = null;
let currentChapter = 0;
let routeLines = [];
let cityMarkers = [];
let highlightMarkers = [];

fetch('data/silk-road.json').then(r => r.json()).then(d => {
  DATA = d;
  initProgress();
  renderChapter(0);
}).catch(() => {
  fetch('https://scarlettlab2026.github.io/silk-road-2026/data/silk-road.json')
    .then(r => r.json()).then(d => { DATA = d; initProgress(); renderChapter(0); });
});

function initProgress() {
  const el = document.getElementById('progress');
  el.innerHTML = STORY.map((_, i) =>
    `<div class="dot${i===0?' active':''}" id="dot${i}"></div>`
  ).join('');
}

function updateProgress(idx) {
  for (let i = 0; i < TOTAL; i++) {
    const d = document.getElementById('dot'+i);
    if (!d) continue;
    d.className = 'dot' + (i === idx ? ' active' : i < idx ? ' done' : '');
  }
}

function renderChapter(idx) {
  const ch = STORY[idx];
  currentChapter = idx;
  updateProgress(idx);

  document.getElementById('chNum').textContent = `第 ${idx+1} 章 / ${TOTAL}`;
  document.getElementById('chTitle').textContent = ch.subtitle;
  document.getElementById('chBody').textContent = ch.body;

  const card = document.getElementById('narrative');
  card.classList.add('fading');
  setTimeout(() => { card.classList.remove('fading'); }, 200);

  document.querySelector('#narrative .hint').innerHTML =
    idx < TOTAL - 1
      ? '<span class="arrow">→</span> 点击继续'
      : '<span style="font-size:1rem">🕉️</span> 点击重播';

  map.flyTo([ch.lat, ch.lng], ch.zoom, { duration: 1.8, easeLinearity: 0.25 });

  routeLines.forEach(l => map.removeLayer(l)); routeLines = [];
  cityMarkers.forEach(m => map.removeLayer(m)); cityMarkers = [];
  highlightMarkers.forEach(m => map.removeLayer(m)); highlightMarkers = [];

  if (ch.route && DATA) {
    const pts = [];
    ch.route.forEach(nid => {
      const c = DATA.nodes.cities.find(cc => cc.id === nid);
      if (c) pts.push([c.lat, c.lng]);
    });
    if (pts.length >= 2) {
      routeLines.push(L.polyline(pts, {
        color: 'rgba(196,122,56,0.15)', weight: 2, dashArray: '8 6'
      }).addTo(map));
      routeLines.push(L.polyline(pts, {
        color: 'rgba(196,122,56,0.8)', weight: 3.5, dashArray: '12 4'
      }).addTo(map));
    }
  }

  if (ch.showCities && DATA) {
    ch.showCities.forEach(nid => {
      const c = DATA.nodes.cities.find(cc => cc.id === nid);
      if (!c) return;
      const isKey = nid === ch.marker || (ch.highlight && ch.highlight.includes(nid));
      const isStart = nid === 'changan' || nid === 'luoyang';
      const m = L.circleMarker([c.lat, c.lng], {
        radius: isStart ? 8 : isKey ? 7 : 5,
        fillColor: isStart ? '#fff' : 'var(--accent, #c47a38)',
        color: '#0f0d0c', weight: 1.5, fillOpacity: isKey ? 1 : 0.7
      }).addTo(map);
      m.bindTooltip(c.name, { direction: 'top', offset: [0, -6] });
      cityMarkers.push(m);
    });
  }

  if (ch.marker && DATA) {
    const c = DATA.nodes.cities.find(cc => cc.id === ch.marker);
    if (c) {
      highlightMarkers.push(L.circleMarker([c.lat, c.lng], {
        radius: 14, fillColor: 'rgba(255,255,255,0.25)',
        color: 'transparent', fillOpacity: 0.6
      }).addTo(map));
      highlightMarkers.push(L.circleMarker([c.lat, c.lng], {
        radius: 8, fillColor: '#fff', color: '#0f0d0c', weight: 2, fillOpacity: 1
      }).addTo(map));
    }
  }

  const badgeRow = document.getElementById('badges');
  if (ch.highlight && DATA) {
    const colors = { figure: '#5b9bd5', goods: '#6aad6a', event: '#c75b3a' };
    badgeRow.innerHTML = ch.highlight.filter(id => id !== (ch.marker || '')).map(eid => {
      let entity = null, cat = '';
      for (const c of ['figures','goods','events']) {
        entity = DATA.nodes[c].find(n => n.id === eid);
        if (entity) { cat = c === 'figures' ? 'figure' : c === 'goods' ? 'goods' : 'event'; break; }
      }
      if (!entity) return '';
      const color = colors[cat];
      const label = entity.type || entity.category || entity.dynasty || '';
      return `<span style="display:inline-block;padding:4px 10px;margin:2px;border-radius:10px;font-size:0.73rem;border:1px solid ${color};color:${color};background:rgba(255,255,255,0.03)"><strong>${entity.name}</strong> <span style="opacity:0.7">${label}</span></span>`;
    }).join('');
  } else {
    badgeRow.innerHTML = '';
  }
}

function toggleCard() {
  const card = document.getElementById('narrative');
  const btn = document.getElementById('toggle-card');
  card.classList.toggle('collapsed');
  btn.textContent = card.classList.contains('collapsed') ? '＋' : '─';
}

function advance() {
  const card = document.getElementById('narrative');
  if (card.classList.contains('collapsed')) {
    toggleCard();
    return;
  }
  if (currentChapter < TOTAL - 1) {
    renderChapter(currentChapter + 1);
  } else {
    restart();
  }
}

function restart() {
  routeLines.forEach(l => map.removeLayer(l)); routeLines = [];
  cityMarkers.forEach(m => map.removeLayer(m)); cityMarkers = [];
  highlightMarkers.forEach(m => map.removeLayer(m)); highlightMarkers = [];
  renderChapter(0);
}

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === ' ' || e.code === 'Space') {
    e.preventDefault(); advance();
  }
  if (e.key === 'ArrowLeft') {
    e.preventDefault();
    if (currentChapter > 0) renderChapter(currentChapter - 1);
  }
});
</script>
</body>
</html>
