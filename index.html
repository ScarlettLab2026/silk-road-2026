<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>丝绸之路 · 交互知识图谱</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
  :root {
    --bg: #1a1a1f;
    --panel-bg: #222228;
    --text: #e0ddd5;
    --text-dim: #9a9790;
    --accent: #d4a853;
    --accent2: #c75b3a;
    --border: #333338;
    --city: #d4a853;
    --figure: #5b9bd5;
    --goods: #6aad6a;
    --event: #c75b3a;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh; display: flex; flex-direction: column;
    overflow: hidden;
  }

  /* ── Header ── */
  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 20px; background: var(--panel-bg); border-bottom: 1px solid var(--border);
    z-index: 1000; flex-shrink: 0;
  }
  header h1 { font-size: 1.1rem; font-weight: 600; letter-spacing: 0.04em; }
  header h1 .sub { font-weight: 400; color: var(--text-dim); margin-left: 6px; font-size: 0.85rem; }
  .lang-toggle {
    background: var(--border); color: var(--text); border: none; padding: 6px 14px;
    border-radius: 16px; cursor: pointer; font-size: 0.82rem; transition: background 0.2s;
  }
  .lang-toggle:hover { background: var(--accent); color: #111; }

  /* ── Main layout ── */
  main { display: flex; flex: 1; min-height: 0; }
  #map { flex: 1; z-index: 1; }

  /* ── Sidebar ── */
  aside {
    width: 380px; flex-shrink: 0; background: var(--panel-bg);
    border-left: 1px solid var(--border); display: flex; flex-direction: column;
    overflow: hidden; z-index: 1000;
  }
  .filters {
    display: flex; gap: 6px; padding: 12px 16px; border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
  }
  .filters button {
    background: transparent; border: 1px solid var(--border); color: var(--text-dim);
    padding: 4px 12px; border-radius: 14px; cursor: pointer; font-size: 0.78rem;
    transition: all 0.2s;
  }
  .filters button.active { border-color: var(--accent); color: var(--accent); }
  .filters button.city.active  { border-color: var(--city); color: var(--city); }
  .filters button.figure.active { border-color: var(--figure); color: var(--figure); }
  .filters button.goods.active  { border-color: var(--goods); color: var(--goods); }
  .filters button.event.active  { border-color: var(--event); color: var(--event); }
  .filters button:hover { background: rgba(255,255,255,0.05); }
  .filters .count { font-size: 0.7rem; color: var(--text-dim); }

  .list-panel { flex: 1; overflow-y: auto; padding: 8px 0; }
  .list-panel .card {
    padding: 12px 16px; border-bottom: 1px solid rgba(255,255,255,0.04);
    cursor: pointer; transition: background 0.15s;
    border-left: 3px solid transparent;
  }
  .list-panel .card:hover { background: rgba(255,255,255,0.04); }
  .list-panel .card.active { background: rgba(255,255,255,0.06); border-left-color: var(--accent); }
  .card .card-type {
    font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.08em;
    margin-bottom: 2px;
  }
  .card-type.city   { color: var(--city); }
  .card-type.figure { color: var(--figure); }
  .card-type.goods  { color: var(--goods); }
  .card-type.event  { color: var(--event); }
  .card .card-name { font-size: 0.95rem; font-weight: 600; }
  .card .card-sub  { font-size: 0.75rem; color: var(--text-dim); margin-top: 1px; }

  .detail-panel {
    padding: 20px 16px; border-top: 1px solid var(--border);
    max-height: 280px; overflow-y: auto; flex-shrink: 0;
  }
  .detail-panel h3 { font-size: 1.05rem; margin-bottom: 4px; }
  .detail-panel .meta { font-size: 0.78rem; color: var(--text-dim); margin-bottom: 10px; }
  .detail-panel .desc { font-size: 0.85rem; line-height: 1.7; color: var(--text); }
  .detail-panel .relations { margin-top: 12px; }
  .detail-panel .relations h4 { font-size: 0.75rem; color: var(--text-dim); margin-bottom: 6px; }
  .detail-panel .tag {
    display: inline-block; background: rgba(255,255,255,0.06); padding: 3px 10px;
    border-radius: 10px; margin: 2px; font-size: 0.72rem; cursor: pointer;
  }
  .detail-panel .tag:hover { background: var(--accent); color: #111; }

  /* ── Timeline ── */
  #timeline-bar {
    height: 52px; flex-shrink: 0; background: var(--panel-bg);
    border-top: 1px solid var(--border); display: flex; align-items: center;
    padding: 0 20px; overflow-x: auto; gap: 2px; z-index: 1000;
  }
  #timeline-bar .tick {
    flex-shrink: 0; padding: 6px 12px; font-size: 0.7rem; cursor: pointer;
    border-radius: 4px; color: var(--text-dim); transition: all 0.15s;
    text-align: center; min-width: 60px;
  }
  #timeline-bar .tick:hover { background: rgba(255,255,255,0.06); }
  #timeline-bar .tick.active { background: var(--accent); color: #111; font-weight: 600; }

  /* ── Leaflet overrides ── */
  .leaflet-container { background: #1a1a1f; font-family: inherit; }
  .leaflet-popup-content-wrapper {
    background: var(--panel-bg); color: var(--text); border-radius: 8px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.5);
  }
  .leaflet-popup-tip { background: var(--panel-bg); }
  .leaflet-popup-content { margin: 10px 14px; font-size: 0.85rem; line-height: 1.5; }
  .leaflet-popup-content b { color: var(--accent); }

  /* ── Graph View ── */
  #graph-view {
    flex: 1; background: var(--bg); position: relative; overflow: hidden;
    display: none;
  }
  #graph-view.active { display: flex; }
  #graph-view svg { width: 100%; height: 100%; }
  #graph-view .node circle { transition: r 0.2s, stroke-width 0.2s; }
  #graph-view .node text { font-size: 9px; fill: var(--text-dim); pointer-events: none; transition: opacity 0.2s; }
  #graph-view .link { stroke-opacity: 0.15; }
  #graph-view .tooltip {
    position: absolute; background: var(--panel-bg); color: var(--text);
    padding: 8px 12px; border-radius: 6px; font-size: 0.78rem;
    pointer-events: none; box-shadow: 0 4px 16px rgba(0,0,0,0.5);
    z-index: 10; max-width: 240px; line-height: 1.4;
    opacity: 0; transition: opacity 0.15s;
  }
  #graph-view .legend {
    position: absolute; bottom: 16px; left: 16px; display: flex; gap: 14px;
    background: rgba(34,34,40,0.85); padding: 8px 14px; border-radius: 8px;
    font-size: 0.72rem; z-index: 5;
  }
  #graph-view .legend span { display: flex; align-items: center; gap: 5px; }
  #graph-view .legend .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }

  /* ── Route Animation ── */
  #route-overlay {
    position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    z-index: 999; display: none; flex-direction: column;
    pointer-events: none;
  }
  #route-overlay.active { display: flex; }
  #route-selector {
    position: absolute; top: 16px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 10px; overflow-x: auto; max-width: 90vw;
    padding: 12px 16px; background: rgba(28,28,34,0.95);
    border-radius: 14px; border: 1px solid var(--border);
    z-index: 10; pointer-events: auto;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  }
  #route-selector .route-opt {
    flex-shrink: 0; width: 180px; padding: 14px 16px;
    background: var(--panel-bg); border: 1px solid var(--border);
    border-radius: 10px; cursor: pointer; transition: all 0.2s;
    text-align: center;
  }
  #route-selector .route-opt:hover { border-color: var(--accent); background: rgba(212,168,83,0.06); }
  #route-selector .route-opt.active { border-color: var(--accent); background: rgba(212,168,83,0.1); }
  #route-selector .route-opt .r-icon { font-size: 1.5rem; }
  #route-selector .route-opt .r-name { font-size: 0.85rem; font-weight: 600; margin: 4px 0; }
  #route-selector .route-opt .r-dir  { font-size: 0.65rem; color: var(--text-dim); }
  #route-selector .route-opt .r-count { font-size: 0.6rem; color: var(--accent); margin-top: 2px; }

  #anim-controls {
    position: absolute; bottom: 68px; left: 50%; transform: translateX(-50%);
    display: none; align-items: center; gap: 14px;
    padding: 10px 20px; background: rgba(28,28,34,0.95);
    border-radius: 24px; border: 1px solid var(--border);
    z-index: 10; pointer-events: auto;
    box-shadow: 0 4px 20px rgba(0,0,0,0.4);
  }
  #anim-controls.visible { display: flex; }
  #anim-controls button {
    background: transparent; border: none; color: var(--text);
    cursor: pointer; font-size: 1.2rem; padding: 4px 8px; border-radius: 8px;
    transition: background 0.15s;
  }
  #anim-controls button:hover { background: rgba(255,255,255,0.1); }
  #anim-controls button.speed-btn {
    font-size: 0.7rem; padding: 3px 10px; border: 1px solid var(--border);
    border-radius: 12px; color: var(--text-dim);
  }
  #anim-controls button.speed-btn.active { background: var(--accent); color: #111; border-color: var(--accent); }
  #anim-progress {
    position: absolute; bottom: 16px; left: 20px; right: 20px;
    height: 36px; display: none; z-index: 10; pointer-events: auto;
    align-items: center; gap: 0;
  }
  #anim-progress.visible { display: flex; }
  #anim-progress .bar-bg {
    flex: 1; height: 4px; background: var(--border); border-radius: 2px;
    position: relative; overflow: visible;
  }
  #anim-progress .bar-fill {
    height: 100%; background: var(--accent); border-radius: 2px;
    transition: width 0.1s linear; width: 0%;
  }
  #anim-progress .bar-dots {
    position: absolute; top: 50%; transform: translateY(-50%);
    display: flex; width: 100%; justify-content: space-between;
  }
  #anim-progress .bar-dots .dot {
    width: 8px; height: 8px; border-radius: 50%; background: var(--border);
    border: 2px solid var(--panel-bg); cursor: pointer;
    transition: background 0.3s;
  }
  #anim-progress .bar-dots .dot.done { background: var(--accent); }
  #anim-progress .bar-dots .dot.current { background: #fff; box-shadow: 0 0 8px var(--accent); }
  #anim-progress .bar-labels {
    display: flex; width: 100%; justify-content: space-between;
    position: absolute; top: 12px; font-size: 0.55rem; color: var(--text-dim);
  }
  #anim-progress .bar-labels .lbl { text-align: center; transform: translateX(-50%); white-space: nowrap; }

  #anim-info {
    position: absolute; top: 120px; right: 20px; width: 280px;
    padding: 16px; background: rgba(28,28,34,0.95);
    border-radius: 12px; border: 1px solid var(--border);
    z-index: 10; pointer-events: auto; display: none;
    box-shadow: 0 4px 16px rgba(0,0,0,0.3);
  }
  #anim-info.visible { display: block; }
  #anim-info .seg-title { font-size: 0.8rem; font-weight: 600; color: var(--accent); }
  #anim-info .seg-desc  { font-size: 0.75rem; color: var(--text-dim); margin-top: 4px; line-height: 1.5; }
  #anim-info .seg-from  { font-size: 0.7rem; color: var(--text); margin-top: 6px; }

  .marker-anim {
    background: transparent !important; border: none !important;
  }
  .marker-anim .pulse {
    width: 16px; height: 16px; background: var(--accent);
    border-radius: 50%; box-shadow: 0 0 12px var(--accent), 0 0 24px rgba(212,168,83,0.5);
    animation: pulse-ring 1.2s ease-out infinite;
  }
  @keyframes pulse-ring {
    0% { box-shadow: 0 0 8px var(--accent), 0 0 16px rgba(212,168,83,0.4); }
    50% { box-shadow: 0 0 20px var(--accent), 0 0 40px rgba(212,168,83,0.7); }
    100% { box-shadow: 0 0 8px var(--accent), 0 0 16px rgba(212,168,83,0.4); }
  }

  /* ── Responsive ── */
  @media (max-width: 768px) {
    main { flex-direction: column; }
    aside { width: 100%; height: 40%; border-left: none; border-top: 1px solid var(--border); }
    #map { height: 60%; }
  }
</style>
</head>
<body>
<header>
  <h1>🐫 丝绸之路 <span class="sub">Silk Road · 交互知识图谱</span></h1>
  <div style="display:flex;gap:8px;align-items:center">
    <button class="lang-toggle" onclick="toggleView()" id="viewBtn">🕸 关系图</button>
    <button class="lang-toggle" onclick="toggleRouteAnim()" id="routeBtn" style="background:rgba(199,91,58,0.15);border-color:var(--event)">🎬 传播</button>
    <button class="lang-toggle" onclick="toggleLang()" id="langBtn">English</button>
  </div>
</header>

<main>
  <div id="map"></div>
  <div id="graph-view"><div class="tooltip" id="gTooltip"></div></div>
  <aside>
    <div class="filters" id="filters">
      <button class="active" data-type="all">全部 <span class="count"></span></button>
      <button class="city"   data-type="city">🏙 城市</button>
      <button class="figure" data-type="figure">👤 人物</button>
      <button class="goods"  data-type="goods">📦 物产</button>
      <button class="event"  data-type="event">⚡ 事件</button>
    </div>
    <div class="list-panel" id="listPanel"></div>
    <div class="detail-panel" id="detailPanel"></div>
  </aside>
</main>
<div id="timeline-bar"></div>

<!-- Route Animation Overlay -->
<div id="route-overlay">
  <div id="route-selector"></div>
  <div id="anim-controls">
    <button id="anim-prev" title="上一步">⏮</button>
    <button id="anim-play" title="播放/暂停">▶</button>
    <button id="anim-next" title="下一步">⏭</button>
    <button class="speed-btn active" data-speed="1">1×</button>
    <button class="speed-btn" data-speed="2">2×</button>
    <button class="speed-btn" data-speed="4">4×</button>
    <button id="anim-director" style="font-size:0.7rem;padding:3px 12px;border:1px solid var(--event);border-radius:12px;color:var(--event);background:transparent">🎬 导演</button>
    <button id="anim-exit" style="font-size:0.75rem;margin-left:4px">✕ 退出</button>
  </div>
  <div id="anim-progress">
    <div class="bar-bg">
      <div class="bar-fill" id="bar-fill"></div>
      <div class="bar-dots" id="bar-dots"></div>
      <div class="bar-labels" id="bar-labels"></div>
    </div>
  </div>
  <div id="anim-info"><div class="seg-title"></div><div class="seg-desc"></div><div class="seg-from"></div></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://d3js.org/d3.v7.min.js"></script>
<script>
// ── State ──
let lang = 'zh';
let activeFilter = 'all';
let activeEra = null;
let selectedItem = null;
let map, markers = [];
const DATA = {}; // will be loaded

// ── Load data ──
fetch('data/silk-road.json')
  .then(r => r.json())
  .then(d => { Object.assign(DATA, d); init(); })
  .catch(e => {
    // fallback: inline data for GitHub Pages
    console.warn('Fetch failed, trying inline load', e);
    document.getElementById('listPanel').innerHTML = '<div style="padding:40px;text-align:center;color:var(--text-dim)">加载数据中...<br><small>Loading data...</small></div>';
  });

function init() {
  initMap();
  initTimeline();
  renderList();
  updateFilterCounts();
}

// ── i18n helper ──
function t(key) { return lang === 'zh' ? key : key+'_en'; }
function get(obj, key) {
  if (!obj) return '';
  const val = obj[lang === 'zh' ? key : key+'_en'] || obj[key] || '';
  return val;
}

// ── Map ──
function initMap() {
  map = L.map('map', { zoomControl: true, attributionControl: false }).setView([39, 80], 3.8);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    maxZoom: 13
  }).addTo(map);

  // City markers
  const colors = { city: '#d4a853', figure: '#5b9bd5', goods: '#6aad6a', event: '#c75b3a' };

  // Cities
  DATA.nodes.cities.forEach(c => {
    const m = L.circleMarker([c.lat, c.lng], {
      radius: 7, fillColor: colors.city, color: '#222', weight: 1.5, fillOpacity: 0.9
    }).addTo(map);
    m.bindPopup(`<b>${get(c,'name')}</b><br><small>${get(c,'role')}</small><br>${get(c,'description').slice(0,100)}…`);
    m._node = { type: 'city', id: c.id, data: c };
    m.on('click', () => selectNode(c.id, 'city'));
    markers.push(m);
  });

  // Edges as polylines between cities
  DATA.edges.forEach(e => {
    const srcCity = DATA.nodes.cities.find(c => c.id === e.source);
    const tgtCity = DATA.nodes.cities.find(c => c.id === e.target);
    if (srcCity && tgtCity) {
      L.polyline([[srcCity.lat, srcCity.lng], [tgtCity.lat, tgtCity.lng]], {
        color: 'rgba(212,168,83,0.25)', weight: 1.2, dashArray: '4 6'
      }).addTo(map);
    }
  });
}

// ── Timeline ──
function initTimeline() {
  const eras = [
    { key: null, label: '全部', label_en: 'All', range: [-200, 1500] },
    { key: '西汉', label: '西汉', label_en: 'W.Han', range: [-202, 9] },
    { key: '东汉', label: '东汉', label_en: 'E.Han', range: [25, 220] },
    { key: '唐', label: '唐', label_en: 'Tang', range: [618, 907] },
    { key: '宋', label: '宋', label_en: 'Song', range: [960, 1279] },
    { key: '元', label: '元', label_en: 'Yuan', range: [1271, 1368] },
    { key: '明', label: '明', label_en: 'Ming', range: [1368, 1644] },
  ];
  const bar = document.getElementById('timeline-bar');
  bar.innerHTML = eras.map(e => {
    const label = lang === 'zh' ? e.label : e.label_en;
    const cls = activeEra === e.key ? 'tick active' : 'tick';
    return `<span class="${cls}" data-era="${e.key || ''}">${label}</span>`;
  }).join('');
  bar.querySelectorAll('.tick').forEach(el => {
    el.addEventListener('click', () => {
      activeEra = el.dataset.era || null;
      initTimeline();
      renderList();
    });
  });
}

// ── All entities flattened ──
function allEntities() {
  const items = [];
  ['cities','figures','goods','events'].forEach(type => {
    DATA.nodes[type].forEach(d => items.push({ type: type.slice(0,-1), data: d }));
  });
  return items;
}

function entityMatchesFilter(item) {
  if (activeFilter !== 'all' && item.type !== activeFilter) return false;
  if (activeEra && item.data.dynasties && !item.data.dynasties.includes(activeEra)) return false;
  // Also check single dynasty field
  if (activeEra && item.data.dynasty && item.data.dynasty !== activeEra) return false;
  // Events: check if event year falls within era range
  if (activeEra && item.data.year) {
    // approximate
  }
  return true;
}

// ── Render ──
function renderList() {
  const panel = document.getElementById('listPanel');
  const entities = allEntities().filter(entityMatchesFilter);
  if (!entities.length) {
    panel.innerHTML = '<div style="padding:40px;text-align:center;color:var(--text-dim)">无匹配结果<br><small>No matching results</small></div>';
    return;
  }
  panel.innerHTML = entities.map(e => {
    const d = e.data;
    const name = get(d, 'name');
    const sub = e.type === 'city' ? get(d, 'role') :
                e.type === 'figure' ? get(d, 'type') :
                e.type === 'goods' ? get(d, 'category') :
                get(d, 'display_year') || d.year || '';
    const cls = selectedItem && selectedItem.id === d.id ? 'card active' : 'card';
    return `<div class="${cls}" data-id="${d.id}" data-type="${e.type}">
      <div class="card-type ${e.type}">${lang==='zh'?typeLabels[e.type]:typeLabelsEn[e.type]}</div>
      <div class="card-name">${name}</div>
      <div class="card-sub">${sub}</div>
    </div>`;
  }).join('');

  panel.querySelectorAll('.card').forEach(card => {
    card.addEventListener('click', () => selectNode(card.dataset.id, card.dataset.type));
  });
}

const typeLabels = { city: '城市', figure: '人物', goods: '物产', event: '事件' };
const typeLabelsEn = { city: 'City', figure: 'Figure', goods: 'Goods', event: 'Event' };

function selectNode(id, type) {
  const t = type.endsWith('s') ? type : type + 's';
  const data = DATA.nodes[t]?.find(d => d.id === id);
  if (!data) return;
  selectedItem = { id, type: type.endsWith('s') ? type.slice(0,-1) : type, data };

  // Highlight on map
  markers.forEach(m => {
    if (m._node && m._node.id === id) {
      m.setStyle({ radius: 11, fillColor: '#fff', fillOpacity: 1 });
    } else if (m._node) {
      const colors = { city: '#d4a853', figure: '#5b9bd5', goods: '#6aad6a', event: '#c75b3a' };
      m.setStyle({ radius: 7, fillColor: colors[m._node.type] || '#888', fillOpacity: 0.8 });
    }
  });

  // Fly to if city
  if (data.lat && data.lng) {
    map.flyTo([data.lat, data.lng], 5, { duration: 1 });
  }

  renderList();
  renderDetail();
}

function renderDetail() {
  const panel = document.getElementById('detailPanel');
  if (!selectedItem) {
    panel.innerHTML = '<div style="padding:20px;text-align:center;color:var(--text-dim)">点击卡片或地图标记查看详情<br><small>Click a card or map marker</small></div>';
    return;
  }
  const d = selectedItem.data;
  const name = get(d, 'name');
  const desc = get(d, 'description');
  const metaParts = [];
  if (d.country) metaParts.push(get(d, 'country'));
  if (d.era) metaParts.push(d.era);
  if (d.direction) metaParts.push(get(d, 'direction'));
  const meta = metaParts.join(' · ');

  // Find related edges
  const relEdges = DATA.edges.filter(e => e.source === d.id || e.target === d.id);
  const relTags = relEdges.map(e => {
    const otherId = e.source === d.id ? e.target : e.source;
    const relName = get(e, 'relation');
    // Find the target node name
    let otherName = otherId;
    ['cities','figures','goods','events'].forEach(t => {
      const found = DATA.nodes[t].find(n => n.id === otherId);
      if (found) otherName = get(found, 'name');
    });
    return { id: otherId, name: otherName, relation: relName };
  });

  panel.innerHTML = `
    <h3>${name}</h3>
    <div class="meta">${meta}</div>
    <div class="desc">${desc}</div>
    ${relTags.length ? `<div class="relations"><h4>${lang==='zh'?'关联':'Related'}</h4>
      ${relTags.map(r => `<span class="tag" data-id="${r.id}">${r.name} · ${r.relation}</span>`).join('')}
    </div>` : ''}
  `;

  // Clickable relation tags
  panel.querySelectorAll('.tag').forEach(tag => {
    tag.addEventListener('click', () => {
      // Find the type of related node
      const rid = tag.dataset.id;
      let rtype = null;
      ['cities','figures','goods','events'].forEach(t => {
        if (DATA.nodes[t].find(n => n.id === rid)) rtype = t.slice(0,-1);
      });
      if (rtype) selectNode(rid, rtype);
    });
  });
}

function updateFilterCounts() {
  const entities = allEntities();
  document.querySelectorAll('.filters button').forEach(btn => {
    const type = btn.dataset.type;
    const count = type === 'all' ? entities.length : entities.filter(e => e.type === type).length;
    btn.querySelector('.count').textContent = `(${count})`;
  });
}

// ── Filter buttons ──
document.getElementById('filters').addEventListener('click', e => {
  const btn = e.target.closest('button');
  if (!btn) return;
  activeFilter = btn.dataset.type;
  document.querySelectorAll('.filters button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderList();
});

// ── Route Animation ──
let routeMode = false;
let routePlaying = false;
let routeRaf = null;
let routeProgress = 0;
let routeSpeed = 1;
let routeCurrent = null; // selected route data
let routeLatLngs = [];
let routeDists = [];
let routeTotalDist = 0;
let routePolyline = null;
let routeAnimMarker = null;
let routeSegIdx = -1;

function toggleRouteAnim() {
  routeMode = !routeMode;
  const overlay = document.getElementById('route-overlay');
  const mapEl = document.getElementById('map');
  const graphEl = document.getElementById('graph-view');
  const routeBtn = document.getElementById('routeBtn');

  if (routeMode) {
    // Exit graph mode if active
    if (currentView === 'graph') toggleView();
    // Hide sidebar
    document.querySelector('aside').style.display = 'none';
    document.getElementById('timeline-bar').style.display = 'none';
    overlay.classList.add('active');
    routeBtn.style.background = 'var(--event)';
    routeBtn.style.color = '#111';
    routeBtn.textContent = '🎬 传播 ✓';
    map.invalidateSize();
    if (DATA.routes) buildRouteSelector();
  } else {
    stopRouteAnim();
    document.querySelector('aside').style.display = '';
    document.getElementById('timeline-bar').style.display = '';
    overlay.classList.remove('active');
    document.getElementById('route-selector').innerHTML = '';
    document.getElementById('anim-controls').classList.remove('visible');
    document.getElementById('anim-progress').classList.remove('visible');
    document.getElementById('anim-info').classList.remove('visible');
    routeBtn.style.background = 'rgba(199,91,58,0.15)';
    routeBtn.style.color = '';
    routeBtn.textContent = '🎬 传播';
    map.invalidateSize();
  }
}

function buildRouteSelector() {
  const el = document.getElementById('route-selector');
  const icons = { 'silk-westward': '🧵', 'paper-westward': '📜', 'buddhism-eastward': '🕉️',
                  'compass-maritime': '🧭', 'spice-eastward': '🌿', 'porcelain-maritime': '🏺',
                  'gunpowder-westward': '💥', 'tea-route': '🍵' };
  el.innerHTML = DATA.routes.map(r => `
    <div class="route-opt" data-id="${r.id}" onclick="selectRoute('${r.id}')">
      <div class="r-icon">${icons[r.id] || '🐫'}</div>
      <div class="r-name">${r.name}</div>
      <div class="r-dir">${r.direction}</div>
      <div class="r-count">${r.nodes.length} 个节点</div>
    </div>
  `).join('');
}

function selectRoute(id) {
  stopRouteAnim();
  routeCurrent = DATA.routes.find(r => r.id === id);
  if (!routeCurrent) return;

  // Highlight selected card
  document.querySelectorAll('.route-opt').forEach(el => el.classList.remove('active'));
  document.querySelector(`.route-opt[data-id="${id}"]`)?.classList.add('active');

  // Build latLngs from route nodes
  routeLatLngs = [];
  const missingNodes = [];
  routeCurrent.nodes.forEach(nodeId => {
    const city = DATA.nodes.cities.find(c => c.id === nodeId);
    if (city) {
      routeLatLngs.push([city.lat, city.lng]);
    } else {
      missingNodes.push(nodeId);
    }
  });

  if (routeLatLngs.length < 2) {
    console.warn('Route has fewer than 2 valid cities');
    return;
  }

  // Compute cumulative distances
  routeDists = [0];
  for (let i = 1; i < routeLatLngs.length; i++) {
    const d = map.distance(routeLatLngs[i-1], routeLatLngs[i]);
    routeDists.push(routeDists[i-1] + d);
  }
  routeTotalDist = routeDists[routeDists.length - 1];

  // Draw polylines: dim full + bright traveled
  if (routePolyline) { map.removeLayer(routePolyline); routePolyline = null; }
  if (window._routeTraveledLine) { map.removeLayer(window._routeTraveledLine); window._routeTraveledLine = null; }
  // Dim full path
  routePolyline = L.polyline(routeLatLngs, {
    color: 'rgba(199,91,58,0.2)', weight: 2, opacity: 0.6, dashArray: '6 6'
  }).addTo(map);
  // Bright traveled path (starts empty)
  window._routeTraveledLine = L.polyline([], {
    color: 'var(--event)', weight: 3.5, opacity: 0.9
  }).addTo(map);

  // Add city markers
  routeCurrent.nodes.forEach((nodeId, i) => {
    const city = DATA.nodes.cities.find(c => c.id === nodeId);
    if (!city) return;
    const m = L.circleMarker([city.lat, city.lng], {
      radius: i === 0 ? 9 : i === routeCurrent.nodes.length - 1 ? 9 : 6,
      fillColor: i === 0 ? '#fff' : i === routeCurrent.nodes.length - 1 ? 'var(--event)' : 'var(--city)',
      color: '#222', weight: 1.5, fillOpacity: 0.9
    }).addTo(map);
    const label = lang === 'zh' ? city.name : (city.name_en || city.name);
    m.bindTooltip(label, { direction: 'top', permanent: i === 0 || i === routeCurrent.nodes.length - 1 });
    m._routeMarker = true;
  });

  // Create animated marker
  if (routeAnimMarker) map.removeLayer(routeAnimMarker);
  const pulseIcon = L.divIcon({ className: 'marker-anim', html: '<div class="pulse"></div>', iconSize: [16, 16], iconAnchor: [8, 8] });
  routeAnimMarker = L.marker(routeLatLngs[0], { icon: pulseIcon, zIndexOffset: 1000 }).addTo(map);

  // Fit map to route
  map.fitBounds(L.latLngBounds(routeLatLngs), { padding: [60, 60] });

  // Show controls
  document.getElementById('anim-controls').classList.add('visible');
  document.getElementById('anim-progress').classList.add('visible');
  document.getElementById('anim-info').classList.add('visible');

  // Build progress bar
  buildProgressBar();

  // Reset and start
  routeProgress = 0;
  routeSegIdx = -1;
  updateAnimInfo(0);
  routePlaying = true;
  document.getElementById('anim-play').textContent = '⏸';
  animateRoute();
}

function buildProgressBar() {
  const dotsEl = document.getElementById('bar-dots');
  const labelsEl = document.getElementById('bar-labels');
  dotsEl.innerHTML = routeCurrent.nodes.map((nid, i) => {
    const city = DATA.nodes.cities.find(c => c.id === nid);
    const label = city ? (lang === 'zh' ? city.name : (city.name_en || city.name)) : nid;
    return `<span class="dot" data-idx="${i}" title="${label}" onclick="jumpToNode(${i})"></span>`;
  }).join('');
  labelsEl.innerHTML = routeCurrent.nodes.map(nid => {
    const city = DATA.nodes.cities.find(c => c.id === nid);
    const label = city ? (lang === 'zh' ? city.name : (city.name_en || city.name)) : nid;
    return `<span class="lbl">${label}</span>`;
  }).join('');
}

function positionAt(progress) {
  const targetDist = progress * routeTotalDist;
  for (let i = 1; i < routeDists.length; i++) {
    if (routeDists[i] >= targetDist) {
      const segLen = routeDists[i] - routeDists[i-1];
      const rawT = segLen > 0 ? (targetDist - routeDists[i-1]) / segLen : 0;
      // easeInOutCubic
      const t = rawT < 0.5 ? 4*rawT*rawT*rawT : 1 - Math.pow(-2*rawT + 2, 3)/2;
      const lat = routeLatLngs[i-1][0] + t * (routeLatLngs[i][0] - routeLatLngs[i-1][0]);
      const lng = routeLatLngs[i-1][1] + t * (routeLatLngs[i][1] - routeLatLngs[i-1][1]);
      return { lat, lng, segIdx: i - 1, rawSegProgress: rawT };
    }
  }
  const last = routeLatLngs.length - 1;
  return { lat: routeLatLngs[last][0], lng: routeLatLngs[last][1], segIdx: last - 1, rawSegProgress: 1 };
}

function updateAnimInfo(segIdx) {
  if (segIdx === routeSegIdx || segIdx < 0 || segIdx >= routeCurrent.segments.length) return;
  routeSegIdx = segIdx;
  const seg = routeCurrent.segments[segIdx];
  const fromCity = DATA.nodes.cities.find(c => c.id === seg.from);
  const toCity = DATA.nodes.cities.find(c => c.id === seg.to);
  const fromName = fromCity ? (lang === 'zh' ? fromCity.name : (fromCity.name_en || fromCity.name)) : seg.from;
  const toName = toCity ? (lang === 'zh' ? toCity.name : (toCity.name_en || toCity.name)) : seg.to;
  const relText = lang === 'zh' ? seg.relation : (seg.relation_en || seg.relation);

  const infoEl = document.getElementById('anim-info');
  infoEl.querySelector('.seg-title').textContent = `${fromName} → ${toName}`;
  infoEl.querySelector('.seg-desc').textContent = relText;
  infoEl.querySelector('.seg-from').textContent = `${routeCurrent.name} · 第${segIdx+1}/${routeCurrent.segments.length}段`;
}

function animateRoute() {
  if (!routePlaying || !routeCurrent) return;

  routeProgress += 0.0005 * routeSpeed;
  if (routeProgress >= 1) {
    routeProgress = 1;
    routePlaying = false;
    document.getElementById('anim-play').textContent = '🔄';
  }

  const pos = positionAt(routeProgress);
  if (routeAnimMarker) routeAnimMarker.setLatLng([pos.lat, pos.lng]);

  // Update traveled polyline
  if (window._routeTraveledLine && routeLatLngs.length > 1) {
    const traveled = [];
    for (let i = 0; i < routeLatLngs.length - 1; i++) {
      const segStart = routeDists[i] / routeTotalDist;
      const segEnd = routeDists[i+1] / routeTotalDist;
      if (routeProgress >= segEnd) {
        traveled.push(routeLatLngs[i]);
      } else if (routeProgress >= segStart) {
        traveled.push(routeLatLngs[i]);
        traveled.push([pos.lat, pos.lng]);
        break;
      }
    }
    if (routeProgress >= 1) traveled.push(routeLatLngs[routeLatLngs.length - 1]);
    if (traveled.length >= 2) window._routeTraveledLine.setLatLngs(traveled);
    else window._routeTraveledLine.setLatLngs([]);
  }

  // Update progress bar
  document.getElementById('bar-fill').style.width = (routeProgress * 100) + '%';

  // Update dots
  const dots = document.querySelectorAll('#bar-dots .dot');
  const targetSeg = pos.segIdx + 1; // the node we're approaching
  dots.forEach((dot, i) => {
    dot.classList.remove('done', 'current');
    if (i <= pos.segIdx) dot.classList.add('done');
    if (i === targetSeg && routeProgress < 1) dot.classList.add('current');
    if (i === dots.length - 1 && routeProgress >= 1) dot.classList.add('current');
  });

  // Update segment info
  updateAnimInfo(pos.segIdx);

  routeRaf = requestAnimationFrame(animateRoute);
}

function stopRouteAnim() {
  routePlaying = false;
  if (routeRaf) { cancelAnimationFrame(routeRaf); routeRaf = null; }
  if (routePolyline) { map.removeLayer(routePolyline); routePolyline = null; }
  if (window._routeTraveledLine) { map.removeLayer(window._routeTraveledLine); window._routeTraveledLine = null; }
  if (routeAnimMarker) { map.removeLayer(routeAnimMarker); routeAnimMarker = null; }
  // Remove route city markers
  markers.forEach(m => { if (m._routeMarker) { map.removeLayer(m); } });
  markers = markers.filter(m => !m._routeMarker);
  routeSegIdx = -1;
}

function jumpToNode(idx) {
  if (!routeCurrent || idx < 0 || idx >= routeCurrent.nodes.length) return;
  // Calculate progress to that node
  const segs = routeCurrent.segments.length;
  routeProgress = segs > 0 ? idx / segs : 0;
  if (routeProgress > 1) routeProgress = 1;
  const pos = positionAt(routeProgress);
  if (routeAnimMarker) routeAnimMarker.setLatLng([pos.lat, pos.lng]);
  document.getElementById('bar-fill').style.width = (routeProgress * 100) + '%';
  updateAnimInfo(Math.min(pos.segIdx, routeCurrent.segments.length - 1));
}

// Animation control handlers
document.getElementById('anim-play').addEventListener('click', () => {
  if (routeProgress >= 1) {
    // Replay
    routeProgress = 0;
    routeSegIdx = -1;
    updateAnimInfo(0);
    document.getElementById('bar-fill').style.width = '0%';
    document.querySelectorAll('#bar-dots .dot').forEach(d => d.classList.remove('done', 'current'));
  }
  routePlaying = !routePlaying;
  document.getElementById('anim-play').textContent = routePlaying ? '⏸' : (routeProgress >= 1 ? '🔄' : '▶');
  if (routePlaying) animateRoute();
});

document.getElementById('anim-prev').addEventListener('click', () => {
  if (!routeCurrent) return;
  const curSeg = routeSegIdx >= 0 ? routeSegIdx : 0;
  jumpToNode(Math.max(0, curSeg));
});

document.getElementById('anim-next').addEventListener('click', () => {
  if (!routeCurrent) return;
  const curSeg = routeSegIdx >= 0 ? routeSegIdx : 0;
  jumpToNode(Math.min(routeCurrent.segments.length, curSeg + 1));
});

document.getElementById('anim-exit').addEventListener('click', () => {
  toggleRouteAnim();
  // Re-show all city markers
  markers.forEach(m => { if (m._node) m.addTo(map); });
});

// ── Director Mode: auto-play all routes ──
let directorMode = false;
let directorRouteIdx = 0;
let directorTimer = null;
const DIRECTOR_ROUTE_DURATION = 20000; // 20s per route

function toggleDirectorMode() {
  directorMode = !directorMode;
  const btn = document.getElementById('anim-director');

  if (directorMode) {
    if (!DATA.routes || !DATA.routes.length) return;
    btn.textContent = '⏹ 停止';
    btn.style.background = 'var(--event)';
    btn.style.color = '#fff';
    // Hide selector and info for cleaner view
    document.getElementById('route-selector').style.display = 'none';
    document.getElementById('anim-info').classList.remove('visible');
    // Start with first route
    directorRouteIdx = 0;
    playDirectorRoute();
  } else {
    btn.textContent = '🎬 导演';
    btn.style.background = 'transparent';
    btn.style.color = 'var(--event)';
    document.getElementById('route-selector').style.display = '';
    stopRouteAnim();
    if (directorTimer) { clearTimeout(directorTimer); directorTimer = null; }
    document.getElementById('anim-controls').classList.remove('visible');
    document.getElementById('anim-progress').classList.remove('visible');
    // Return to route selection
    buildRouteSelector();
    document.getElementById('anim-controls').classList.add('visible');
    document.getElementById('anim-progress').classList.add('visible');
  }
}

function playDirectorRoute() {
  if (!directorMode) return;
  if (directorRouteIdx >= DATA.routes.length) {
    // All done
    directorMode = false;
    toggleDirectorMode();
    return;
  }
  selectRoute(DATA.routes[directorRouteIdx].id);
  routeSpeed = 1.8; // slightly faster for auto-play
  // Update speed buttons
  document.querySelectorAll('#anim-controls .speed-btn').forEach(b => {
    b.classList.toggle('active', parseInt(b.dataset.speed) === 2);
  });

  // Move to next route after duration
  directorTimer = setTimeout(() => {
    directorRouteIdx++;
    playDirectorRoute();
  }, DIRECTOR_ROUTE_DURATION);
}

document.getElementById('anim-director').addEventListener('click', toggleDirectorMode);

// ESC to exit director mode
document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && directorMode) {
    toggleDirectorMode();
  }
});

document.querySelectorAll('#anim-controls .speed-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    routeSpeed = parseInt(btn.dataset.speed);
    document.querySelectorAll('#anim-controls .speed-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  });
});

// ── View toggle ──
let currentView = 'map';

function toggleView() {
  currentView = currentView === 'map' ? 'graph' : 'map';
  const btn = document.getElementById('viewBtn');
  const mapEl = document.getElementById('map');
  const graphEl = document.getElementById('graph-view');
  if (currentView === 'graph') {
    mapEl.style.display = 'none';
    graphEl.classList.add('active');
    btn.textContent = '🗺 地图';
    if (!window._graphBuilt) buildGraph();
    window.addEventListener('resize', () => { if (window._resizeTimer) clearTimeout(window._resizeTimer); window._resizeTimer = setTimeout(buildGraph, 300); });
  } else {
    mapEl.style.display = '';
    graphEl.classList.remove('active');
    btn.textContent = '🕸 关系图';
    map.invalidateSize();
  }
}

function buildGraph() {
  window._graphBuilt = true;
  const container = document.getElementById('graph-view');
  const W = container.clientWidth;
  const H = container.clientHeight;
  container.querySelector('svg')?.remove();

  const svg = d3.select('#graph-view').append('svg')
    .attr('viewBox', [0, 0, W, H]);
  const g = svg.append('g');

  // Legend
  const legend = d3.select('#graph-view').append('div').attr('class', 'legend')
    .html(`<span><span class="dot" style="background:var(--city)"></span> ${lang==='zh'?'城市':'City'}</span>
           <span><span class="dot" style="background:var(--figure)"></span> ${lang==='zh'?'人物':'Figure'}</span>
           <span><span class="dot" style="background:var(--goods)"></span> ${lang==='zh'?'物产':'Goods'}</span>
           <span><span class="dot" style="background:var(--event)"></span> ${lang==='zh'?'事件':'Event'}</span>`);

  // Build nodes
  const colors = { city: '#d4a853', figure: '#5b9bd5', goods: '#6aad6a', event: '#c75b3a' };
  const radius = { city: 7, figure: 6, goods: 5, event: 5 };
  const typeOrder = { city: 0, figure: 1, goods: 2, event: 3 };
  const typeLabels = { city: '城市', figure: '人物', goods: '物产', event: '事件' };
  const typeLabelsEn = { city: 'City', figure: 'Figure', goods: 'Goods', event: 'Event' };

  const nodes = [];
  const nodeMap = {};
  ['cities','figures','goods','events'].forEach(type => {
    const singular = type.slice(0,-1);
    DATA.nodes[type].forEach(d => {
      const n = {
        id: d.id, type: singular, name: get(d,'name'),
        desc: (get(d,'description')||'').slice(0,60)+'…',
        extra: singular==='city'?get(d,'role'):singular==='figure'?get(d,'type'):singular==='goods'?get(d,'category'):get(d,'display_year')||'',
        significance: d.significance||3, color: colors[singular]
      };
      nodes.push(n);
      nodeMap[d.id] = n;
    });
  });

  // Build links
  const links = DATA.edges.map(e => {
    const s = nodeMap[e.source], t = nodeMap[e.target];
    if (!s || !t) return null;
    return { source: e.source, target: e.target, relation: get(e,'relation') };
  }).filter(Boolean);

  // Force simulation
  const simulation = d3.forceSimulation(nodes)
    .force('link', d3.forceLink(links).id(d => d.id).distance(60))
    .force('charge', d3.forceManyBody().strength(-200))
    .force('center', d3.forceCenter(W/2, H/2))
    .force('collision', d3.forceCollide().radius(d => radius[d.type]+4));

  const zoom = d3.zoom().scaleExtent([0.3, 4]).on('zoom', ev => g.attr('transform', ev.transform));
  svg.call(zoom);

  // Draw links
  const link = g.append('g').selectAll('line').data(links).join('line')
    .attr('class', 'link')
    .attr('stroke', 'var(--text-dim)')
    .attr('stroke-width', d => { const s=nodes.find(n=>n.id===d.source.id), t=nodes.find(n=>n.id===d.target.id); return Math.min((s?.significance||3)+(t?.significance||3),10)*0.15; });

  // Draw nodes
  const node = g.append('g').selectAll('g').data(nodes).join('g')
    .attr('class', 'node')
    .call(d3.drag().on('start', (ev,d) => { if(!ev.active) simulation.alphaTarget(0.3).restart(); d.fx=d.x; d.fy=d.y; })
      .on('drag', (ev,d) => { d.fx=ev.x; d.fy=ev.y; })
      .on('end', (ev,d) => { if(!ev.active) simulation.alphaTarget(0); d.fx=null; d.fy=null; }));

  node.append('circle')
    .attr('r', d => radius[d.type])
    .attr('fill', d => d.color)
    .attr('stroke', '#222')
    .attr('stroke-width', 1.2);

  node.append('text').text(d => d.name.length>4?d.name.slice(0,4)+'…':d.name)
    .attr('x', d => radius[d.type]+4).attr('y', 3);

  // Tooltip
  const tooltip = document.getElementById('gTooltip');
  node.on('mouseover', (ev, d) => {
    tooltip.style.opacity = 1;
    tooltip.innerHTML = `<b style="color:${d.color}">${d.name}</b> <small>${lang==='zh'?typeLabels[d.type]:typeLabelsEn[d.type]}</small><br><small>${d.extra}</small><br>${d.desc}`;
  }).on('mousemove', ev => {
    tooltip.style.left = (ev.offsetX+14)+'px';
    tooltip.style.top = (ev.offsetY-10)+'px';
  }).on('mouseout', () => { tooltip.style.opacity = 0; });

  // Click selects
  node.on('click', (ev, d) => {
    selectNode(d.id, d.type);
    if (document.getElementById('graph-view').classList.contains('active')) {
      toggleView();
    }
  });

  simulation.on('tick', () => {
    link.attr('x1', d => d.source.x).attr('y1', d => d.source.y)
        .attr('x2', d => d.target.x).attr('y2', d => d.target.y);
    node.attr('transform', d => `translate(${d.x},${d.y})`);
  });
}
</script>
