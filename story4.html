<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>白绢扇归 · 法显西行</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
  :root {
    --bg: #0c1110; --card-bg: rgba(16,24,22,0.93); --accent: #5d8a7c;
    --text: #dde5e2; --text-dim: #8a968f; --border: rgba(255,255,255,0.08);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background: #000; font-family: -apple-system, "PingFang SC", "Noto Serif SC", "Microsoft YaHei", serif; overflow: hidden; height: 100vh; }

  #map { position: fixed; inset: 0; z-index: 1; }
  .leaflet-container { background: #0c1110; }

  /* ── Story Nav ── */
  #story-nav {
    position: fixed; top: 24px; left: 50%; transform: translateX(-50%);
    z-index: 10; display: flex; gap: 0; font-size: 0.73rem;
  }
  #story-nav a {
    padding: 4px 12px; text-decoration: none; color: var(--text-dim);
    border: 1px solid var(--border); background: rgba(0,0,0,0.3);
    transition: all 0.2s; white-space: nowrap;
  }
  #story-nav a:first-child { border-radius: 14px 0 0 14px; }
  #story-nav a:last-child { border-radius: 0 14px 14px 0; }
  #story-nav a.active { color: var(--accent); border-color: var(--accent); background: rgba(93,138,124,0.1); }
  #story-nav a:hover:not(.active) { color: #fff; background: rgba(255,255,255,0.06); }

  /* ── Narrative Card ── */
  #narrative {
    position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%);
    z-index: 10; width: min(92vw, 620px);
    background: var(--card-bg); border: 1px solid var(--border);
    border-radius: 20px; padding: 32px 36px 28px;
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    box-shadow: 0 8px 48px rgba(0,0,0,0.5);
    transition: opacity 0.5s, transform 0.5s;
    cursor: pointer; user-select: none;
  }
  #narrative.fading { opacity: 0; transform: translateX(-50%) translateY(20px); }
  #narrative.collapsed { padding: 12px 24px; }
  #narrative.collapsed p,
  #narrative.collapsed #badges { display: none; }
  #narrative.collapsed h2 { font-size: 0.95rem; margin-bottom: 0; }
  #narrative.collapsed .chapter-num { margin-bottom: 0; }
  #narrative.collapsed .hint { margin-top: 0; margin-left: 12px; display: inline-flex; }
  #toggle-card {
    position: absolute; top: 10px; right: 16px;
    background: none; border: none; color: var(--text-dim);
    font-size: 1.1rem; cursor: pointer; z-index: 2; padding: 2px 8px;
    line-height: 1; transition: color 0.2s;
  }
  #toggle-card:hover { color: #fff; }
  #narrative.collapsed #toggle-card { top: 50%; transform: translateY(-50%); }
  #narrative .chapter-num {
    font-size: 0.7rem; letter-spacing: 0.2em; color: var(--accent);
    text-transform: uppercase; margin-bottom: 6px;
  }
  #narrative h2 {
    font-size: 1.5rem; font-weight: 700; color: #fff;
    margin-bottom: 12px; letter-spacing: 0.04em; line-height: 1.4;
  }
  #narrative p {
    font-size: 1rem; line-height: 1.85; color: var(--text);
    margin-bottom: 6px;
  }
  #narrative .hint {
    margin-top: 18px; font-size: 0.78rem; color: var(--text-dim);
    display: flex; align-items: center; gap: 8px;
  }
  #narrative .hint .arrow { animation: bounce 1.2s infinite; }
  @keyframes bounce { 0%,100%{transform:translateX(0)} 50%{transform:translateX(6px)} }

  /* ── Progress Dots ── */
  #progress {
    position: fixed; top: 60px; left: 50%; transform: translateX(-50%);
    z-index: 10; display: flex; gap: 10px;
  }
  #progress .dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: rgba(255,255,255,0.2); transition: all 0.4s;
  }
  #progress .dot.active { background: var(--accent); transform: scale(1.4); }
  #progress .dot.done { background: rgba(93,138,124,0.5); }

  /* ── Nav buttons ── */
  #restart {
    position: fixed; top: 24px; right: 24px; z-index: 10;
    background: rgba(255,255,255,0.06); border: 1px solid var(--border);
    color: var(--text-dim); padding: 8px 16px; border-radius: 20px;
    font-size: 0.78rem; cursor: pointer; transition: all 0.3s;
  }
  #restart:hover { background: rgba(255,255,255,0.12); color: #fff; }

  @media (max-width: 640px) {
    #narrative { bottom: 16px; padding: 24px 20px 20px; border-radius: 16px; }
    #narrative h2 { font-size: 1.2rem; }
    #narrative p { font-size: 0.9rem; }
    #story-nav a { padding: 3px 9px; font-size: 0.68rem; }
  }
</style>
</head>
<body>

<div id="map"></div>

<div id="story-nav">
  <a href="story.html">📖 张骞</a>
  <a href="story4.html" class="active">🪷 法显</a>
  <a href="story3.html">🧘 玄奘</a>
  <a href="story2.html">🚢 郑和</a>
</div>

<div id="progress"></div>

<button id="restart" onclick="restart()">🔄 重播</button>

<div id="narrative" onclick="advance()">
  <button id="toggle-card" onclick="event.stopPropagation();toggleCard()" title="收起/展开">─</button>
  <div class="chapter-num" id="chNum"></div>
  <h2 id="chTitle"></h2>
  <p id="chBody"></p>
  <div id="badges" style="margin:8px 0 0;line-height:1.8"></div>
  <div class="hint"><span class="arrow">→</span> 点击继续</div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const STORY = [
  {
    title: '六十出发',
    subtitle: '公元399年 · 长安',
    body: '后秦弘始元年，62岁的法显从长安出发。他本已年过花甲，却因汉地佛经戒律残缺不全，决意亲赴天竺求取真经。同行者：慧景、慧达、道整、慧应——四位比丘，五僧结伴。「欲令戒律流通汉地」，一念既定，万水千山。他们经张掖、过敦煌，穿过河西走廊，朝着未知的西方走去。在那个平均寿命不过四十的时代，六十出发——这本身就是一个奇迹。',
    lat: 37.0, lng: 100.0, zoom: 5,
    route: ['changan', 'dunhuang'],
    marker: 'dunhuang',
    showCities: ['changan', 'luoyang', 'dunhuang'],
    highlight: ['faxian', 'faxian-journey', 'buddhism']
  },
  {
    title: '穿越沙海',
    subtitle: '白龙堆 · 于阗',
    body: '出敦煌，即是令人生畏的白龙堆沙漠——「沙河中多有恶鬼热风，遇则皆死，无一全者。上无飞鸟，下无走兽。」法显在《佛国记》里写下这段文字时，已在沙海中跋涉十七天。靠死人的白骨辨认方向，靠滴水支撑生命。穿越死亡之地后，他们抵达西域佛国于阗——塔克拉玛干南缘的绿洲明珠。正值佛诞日，全城万人空巷，彩车游行四五百步，法显惊叹：「尽西域诸国，佛事之盛，莫过于此。」他在于阗停留三月，观摩佛教盛会，记录下西域最繁华的佛国景象。',
    lat: 38.5, lng: 87.0, zoom: 5.2,
    route: ['changan', 'dunhuang', 'khotan'],
    marker: 'khotan',
    showCities: ['dunhuang', 'khotan', 'kashgar'],
    highlight: ['faxian', 'khotan', 'buddhism']
  },
  {
    title: '翻越葱岭',
    subtitle: '帕米尔高原 · 天险',
    body: '从于阗西行，法显面对的是地球上最险峻的屏障——葱岭（帕米尔高原）。「其道艰岨，崖岸险绝。其山唯石，壁立千仞。」同行僧侣慧景在此病倒，口吐白沫，对法显说：「我已不行，你们快走吧，不要都死在这里。」法显抱着同伴不肯放手，慧景最终死在葱岭之上。法显含泪埋葬同伴，独自继续前行。翻过雪岭，终于进入北印度——但五僧之中，已有一人永远留在了雪山上。此后慧达折返于阗，慧应病故于弗楼沙——走到印度的，只剩法显和道整两人。',
    lat: 37.3, lng: 74.5, zoom: 5.5,
    route: ['changan', 'dunhuang', 'khotan', 'taxila'],
    marker: 'taxila',
    showCities: ['khotan', 'kashgar', 'taxila'],
    highlight: ['faxian', 'taxila', 'buddhism']
  },
  {
    title: '犍陀罗·佛的故乡',
    subtitle: '塔克西拉 · 犍陀罗故地',
    body: '进入犍陀罗，法显成为第一位详实记录这片佛土的汉僧。他踏遍塔克西拉的每一处圣迹——佛陀割肉贸鸽处、舍身饲虎塔、四天王献钵处。每到一处，焚香礼拜，记录地理位置、传说故事、建筑形制。他在弗楼沙（白沙瓦）瞻仰了举世闻名的佛钵，又在醯罗城见到了佛顶骨舍利。「日日有国王、长者以香华供养」，法显将这些细节一一载入笔记。与此同时，他震惊地发现——印度佛教的戒律经典，远比汉地完整。这正是他万死不辞来此的原因。',
    lat: 33.8, lng: 72.5, zoom: 6,
    route: ['changan', 'dunhuang', 'khotan', 'taxila'],
    marker: null,
    showCities: ['taxila', 'kashgar'],
    highlight: ['faxian', 'buddhism', 'kumarajiva']
  },
  {
    title: '恒河·抄经岁月',
    subtitle: '中天竺 · 华氏城',
    body: '越犍陀罗，渡印度河，法显进入中天竺。在华氏城（今巴特那）和祇园精舍等佛教中心，他度过了六年时光。学梵文、抄佛经、画佛像——法显是最早系统学习梵文的汉僧之一。他发现印度佛教戒律以口耳相传为主，「无本可写」，只能一字一句默诵记忆。道整在祇园精舍朝拜后感叹：「自今已去，永不复踏汉地。」决定终老印度。法显却说：「我本心欲令戒律流通汉地。」辞别同伴，独自背负着六年抄写的经卷和圣像，走向归途。此时出发时的五僧，只剩他一人东归。',
    lat: 25.6, lng: 83.5, zoom: 5.5,
    route: ['changan', 'dunhuang', 'khotan', 'taxila'],
    marker: null,
    showCities: ['taxila'],
    highlight: ['faxian', 'buddhism', 'faxian-journey']
  },
  {
    title: '狮子国·白绢扇',
    subtitle: '斯里兰卡 · 无畏山寺',
    body: '法显乘商船沿恒河东下，再从多摩梨底港搭大舶入海，航行十四昼夜到达狮子国（斯里兰卡）。他在无畏山寺住下，继续搜寻汉地缺失的戒律经典。一天，在佛殿中，法显忽然看见一柄晋地所产的白绢扇供奉在佛像前——白色的丝绸扇子，来自万里之外的故国。他「不觉凄然泪下」。离开汉地已逾十年，同伴或死或散，只剩自己孤悬海外。他在狮子国停留两年，抄得《长阿含经》《杂阿含经》等汉地未见经典。412年，七十二岁的法显带上全部经卷，登上一艘返回中国的商船。',
    lat: 6.9, lng: 80.0, zoom: 6,
    route: ['changan', 'dunhuang', 'khotan', 'taxila', 'colombo'],
    marker: 'colombo',
    showCities: ['colombo', 'taxila'],
    highlight: ['faxian', 'colombo', 'buddhism']
  },
  {
    title: '归航·一灯传千年',
    subtitle: '公元412年 · 崂山',
    body: '归途比来路更险。船行至印度洋，忽遇黑风暴——「天日晦暗，不知所向。商贾皆慌，欲弃小船以减重。」法显将经卷紧紧抱在怀中：「我为求法至此，今经已得，若船沉当与经俱没。」整整漂流九十余日，任风浪摆布，终于望见了崂山的海岸线。登陆后，当地官员误以为来者必是奸细，幸而太守李嶷识得其僧侣身份。法显没有回长安，而是直奔建康（南京），在道场寺与佛陀跋陀罗合作译经，共译出《摩诃僧祇律》《大般泥洹经》等六部经典。又著《佛国记》——九千五百余字，记录三十余国，是全世界现存最早的中亚-南亚游记。这部薄薄的小书，在一百多年后，被一位年轻僧人在长安读到——他叫玄奘。《佛国记》中法显笔下的菩提树下金刚座、祇园精舍说法处、醯罗城佛顶骨——一字一句，化作了玄奘出发的西行地图。一灯传千年，法显与玄奘，大师与弟子——虽隔百年，灵魂同路。',
    lat: 26.0, lng: 90.0, zoom: 3.5,
    route: ['changan', 'dunhuang', 'khotan', 'taxila', 'colombo'],
    marker: 'changan',
    showCities: ['changan', 'dunhuang', 'khotan', 'taxila', 'colombo'],
    highlight: ['faxian', 'faxian-journey', 'buddhism', 'xuanzang']
  }
];

const TOTAL = STORY.length;

const map = L.map('map', {
  zoomControl: false, attributionControl: false,
  center: [35, 85], zoom: 3.5
});
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  maxZoom: 12
}).addTo(map);

let DATA = null;
let currentChapter = 0;
let routeLines = [];
let cityMarkers = [];
let highlightMarkers = [];

fetch('data/silk-road.json').then(r => r.json()).then(d => {
  DATA = d;
  initProgress();
  renderChapter(0);
}).catch(() => {
  fetch('https://scarlettlab2026.github.io/silk-road-2026/data/silk-road.json')
    .then(r => r.json()).then(d => { DATA = d; initProgress(); renderChapter(0); });
});

function initProgress() {
  const el = document.getElementById('progress');
  el.innerHTML = STORY.map((_, i) =>
    `<div class="dot${i===0?' active':''}" id="dot${i}"></div>`
  ).join('');
}

function updateProgress(idx) {
  for (let i = 0; i < TOTAL; i++) {
    const d = document.getElementById('dot'+i);
    if (!d) continue;
    d.className = 'dot' + (i === idx ? ' active' : i < idx ? ' done' : '');
  }
}

function renderChapter(idx) {
  const ch = STORY[idx];
  currentChapter = idx;
  updateProgress(idx);

  document.getElementById('chNum').textContent = `第 ${idx+1} 章 / ${TOTAL}`;
  document.getElementById('chTitle').textContent = ch.subtitle;
  document.getElementById('chBody').textContent = ch.body;

  const card = document.getElementById('narrative');
  card.classList.add('fading');
  setTimeout(() => { card.classList.remove('fading'); }, 200);

  document.querySelector('#narrative .hint').innerHTML =
    idx < TOTAL - 1
      ? '<span class="arrow">→</span> 点击继续'
      : '<span style="font-size:1rem">🪷</span> 点击重播';

  map.flyTo([ch.lat, ch.lng], ch.zoom, { duration: 1.8, easeLinearity: 0.25 });

  routeLines.forEach(l => map.removeLayer(l)); routeLines = [];
  cityMarkers.forEach(m => map.removeLayer(m)); cityMarkers = [];
  highlightMarkers.forEach(m => map.removeLayer(m)); highlightMarkers = [];

  if (ch.route && DATA) {
    const pts = [];
    ch.route.forEach(nid => {
      const c = DATA.nodes.cities.find(cc => cc.id === nid);
      if (c) pts.push([c.lat, c.lng]);
    });
    if (pts.length >= 2) {
      routeLines.push(L.polyline(pts, {
        color: 'rgba(93,138,124,0.15)', weight: 2, dashArray: '8 6'
      }).addTo(map));
      routeLines.push(L.polyline(pts, {
        color: 'rgba(93,138,124,0.8)', weight: 3.5, dashArray: '12 4'
      }).addTo(map));
    }
  }

  if (ch.showCities && DATA) {
    ch.showCities.forEach(nid => {
      const c = DATA.nodes.cities.find(cc => cc.id === nid);
      if (!c) return;
      const isKey = nid === ch.marker || (ch.highlight && ch.highlight.includes(nid));
      const isStart = nid === 'changan' || nid === 'luoyang';
      const m = L.circleMarker([c.lat, c.lng], {
        radius: isStart ? 8 : isKey ? 7 : 5,
        fillColor: isStart ? '#fff' : 'var(--accent, #5d8a7c)',
        color: '#0c1110', weight: 1.5, fillOpacity: isKey ? 1 : 0.7
      }).addTo(map);
      m.bindTooltip(c.name, { direction: 'top', offset: [0, -6] });
      cityMarkers.push(m);
    });
  }

  if (ch.marker && DATA) {
    const c = DATA.nodes.cities.find(cc => cc.id === ch.marker);
    if (c) {
      highlightMarkers.push(L.circleMarker([c.lat, c.lng], {
        radius: 14, fillColor: 'rgba(255,255,255,0.25)',
        color: 'transparent', fillOpacity: 0.6
      }).addTo(map));
      highlightMarkers.push(L.circleMarker([c.lat, c.lng], {
        radius: 8, fillColor: '#fff', color: '#0c1110', weight: 2, fillOpacity: 1
      }).addTo(map));
    }
  }

  const badgeRow = document.getElementById('badges');
  if (ch.highlight && DATA) {
    const colors = { figure: '#5b9bd5', goods: '#6aad6a', event: '#c75b3a' };
    badgeRow.innerHTML = ch.highlight.filter(id => id !== (ch.marker || '')).map(eid => {
      let entity = null, cat = '';
      for (const c of ['figures','goods','events']) {
        entity = DATA.nodes[c].find(n => n.id === eid);
        if (entity) { cat = c === 'figures' ? 'figure' : c === 'goods' ? 'goods' : 'event'; break; }
      }
      if (!entity) return '';
      const color = colors[cat];
      const label = entity.type || entity.category || entity.dynasty || '';
      return `<span style="display:inline-block;padding:4px 10px;margin:2px;border-radius:10px;font-size:0.73rem;border:1px solid ${color};color:${color};background:rgba(255,255,255,0.03)"><strong>${entity.name}</strong> <span style="opacity:0.7">${label}</span></span>`;
    }).join('');
  } else {
    badgeRow.innerHTML = '';
  }
}

function toggleCard() {
  const card = document.getElementById('narrative');
  const btn = document.getElementById('toggle-card');
  card.classList.toggle('collapsed');
  btn.textContent = card.classList.contains('collapsed') ? '＋' : '─';
}

function advance() {
  const card = document.getElementById('narrative');
  if (card.classList.contains('collapsed')) {
    toggleCard();
    return;
  }
  if (currentChapter < TOTAL - 1) {
    renderChapter(currentChapter + 1);
  } else {
    restart();
  }
}

function restart() {
  routeLines.forEach(l => map.removeLayer(l)); routeLines = [];
  cityMarkers.forEach(m => map.removeLayer(m)); cityMarkers = [];
  highlightMarkers.forEach(m => map.removeLayer(m)); highlightMarkers = [];
  renderChapter(0);
}

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === ' ' || e.code === 'Space') {
    e.preventDefault(); advance();
  }
  if (e.key === 'ArrowLeft') {
    e.preventDefault();
    if (currentChapter > 0) renderChapter(currentChapter - 1);
  }
});
</script>
</body>
</html>
