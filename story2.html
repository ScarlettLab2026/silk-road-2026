<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>鲸波万里 · 郑和下西洋</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
  :root {
    --bg: #0a1014; --card-bg: rgba(14,22,28,0.93); --accent: #5ea3b8;
    --text: #dde4e8; --text-dim: #8a959b; --border: rgba(255,255,255,0.08);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background: #000; font-family: -apple-system, "PingFang SC", "Noto Serif SC", "Microsoft YaHei", serif; overflow: hidden; height: 100vh; }

  #map { position: fixed; inset: 0; z-index: 1; }
  .leaflet-container { background: #0a1014; }

  /* ── Narrative Card ── */
  #narrative {
    position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%);
    z-index: 10; width: min(92vw, 620px);
    background: var(--card-bg); border: 1px solid var(--border);
    border-radius: 20px; padding: 32px 36px 28px;
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    box-shadow: 0 8px 48px rgba(0,0,0,0.5);
    transition: opacity 0.5s, transform 0.5s;
    cursor: pointer; user-select: none;
  }
  #narrative.fading { opacity: 0; transform: translateX(-50%) translateY(20px); }
  #narrative.collapsed { padding: 12px 24px; }
  #narrative.collapsed p,
  #narrative.collapsed #badges { display: none; }
  #narrative.collapsed h2 { font-size: 0.95rem; margin-bottom: 0; }
  #narrative.collapsed .chapter-num { margin-bottom: 0; }
  #narrative.collapsed .hint { margin-top: 0; margin-left: 12px; display: inline-flex; }
  #toggle-card {
    position: absolute; top: 10px; right: 16px;
    background: none; border: none; color: var(--text-dim);
    font-size: 1.1rem; cursor: pointer; z-index: 2; padding: 2px 8px;
    line-height: 1; transition: color 0.2s;
  }
  #toggle-card:hover { color: #fff; }
  #narrative.collapsed #toggle-card { top: 50%; transform: translateY(-50%); }
  #narrative .chapter-num {
    font-size: 0.7rem; letter-spacing: 0.2em; color: var(--accent);
    text-transform: uppercase; margin-bottom: 6px;
  }
  #narrative h2 {
    font-size: 1.5rem; font-weight: 700; color: #fff;
    margin-bottom: 12px; letter-spacing: 0.04em; line-height: 1.4;
  }
  #narrative p {
    font-size: 1rem; line-height: 1.85; color: var(--text);
    margin-bottom: 6px;
  }
  #narrative .hint {
    margin-top: 18px; font-size: 0.78rem; color: var(--text-dim);
    display: flex; align-items: center; gap: 8px;
  }
  #narrative .hint .arrow { animation: bounce 1.2s infinite; }
  @keyframes bounce { 0%,100%{transform:translateX(0)} 50%{transform:translateX(6px)} }

  /* ── Progress Dots ── */
  #progress {
    position: fixed; top: 24px; left: 50%; transform: translateX(-50%);
    z-index: 10; display: flex; gap: 10px;
  }
  #progress .dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: rgba(255,255,255,0.2); transition: all 0.4s;
  }
  #progress .dot.active { background: var(--accent); transform: scale(1.4); }
  #progress .dot.done { background: rgba(94,163,184,0.5); }

  /* ── Nav buttons ── */
  #restart {
    position: fixed; top: 24px; right: 24px; z-index: 10;
    background: rgba(255,255,255,0.06); border: 1px solid var(--border);
    color: var(--text-dim); padding: 8px 16px; border-radius: 20px;
    font-size: 0.78rem; cursor: pointer; transition: all 0.3s;
  }
  #restart:hover { background: rgba(255,255,255,0.12); color: #fff; }
  #back {
    position: fixed; top: 24px; left: 24px; z-index: 10;
    background: rgba(255,255,255,0.06); border: 1px solid var(--border);
    color: var(--text-dim); padding: 8px 16px; border-radius: 20px;
    font-size: 0.78rem; cursor: pointer; transition: all 0.3s;
    text-decoration: none;
  }
  #back:hover { background: rgba(255,255,255,0.12); color: #fff; }

  /* ── Responsive ── */
  @media (max-width: 640px) {
    #narrative { bottom: 16px; padding: 24px 20px 20px; border-radius: 16px; }
    #narrative h2 { font-size: 1.2rem; }
    #narrative p { font-size: 0.9rem; }
  }
</style>
</head>
<body>

<div id="map"></div>

<div id="progress"></div>

<a href="index.html" id="back">← 返回地图</a>
<button id="restart" onclick="restart()">🔄 重播</button>

<div id="narrative" onclick="advance()">
  <button id="toggle-card" onclick="event.stopPropagation();toggleCard()" title="收起/展开">─</button>
  <div class="chapter-num" id="chNum"></div>
  <h2 id="chTitle"></h2>
  <p id="chBody"></p>
  <div id="badges" style="margin:8px 0 0;line-height:1.8"></div>
  <div class="hint"><span class="arrow">→</span> 点击继续</div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// ── Story Data ──
const STORY = [
  {
    title: '鲸波万里',
    subtitle: '1405年 · 泉州港',
    body: '永乐三年，一支人类历史上空前庞大的舰队在泉州港集结。62艘宝船、200余艘辅助舰艇、27800余名船员——这是郑和的舰队。这个原名马和的云南少年，因战功被永乐皇帝赐姓郑，此刻他肩负着前所未有的使命：率领舰队驶向西洋，宣示国威，贯通海路。',
    lat: 19.0, lng: 116.0, zoom: 4.5,
    route: ['quanzhou', 'guangzhou'],
    marker: 'quanzhou',
    showCities: ['quanzhou', 'guangzhou'],
    highlight: ['zheng-he-figure', 'compass', 'porcelain', 'silk']
  },
  {
    title: '巨港擒盗',
    subtitle: '旧港 · 苏门答腊',
    body: '舰队穿过南海，抵达三佛齐旧地巨港。盘踞在此的海盗头目陈祖义，表面归降，暗中却策划劫掠宝船。郑和识破诡计，先发制人——当陈祖义的船队趁夜靠近时，宝船突然亮起全部灯火，火箭齐发。此战歼灭海盗五千余人，生擒陈祖义，押回南京斩首。南海航线从此畅通无阻。',
    lat: 1.0, lng: 107.0, zoom: 5,
    route: ['quanzhou', 'guangzhou', 'palembang'],
    marker: 'palembang',
    showCities: ['quanzhou', 'guangzhou', 'palembang', 'malacca'],
    highlight: ['zheng-he-figure', 'palembang']
  },
  {
    title: '马六甲·海峡王国',
    subtitle: '满剌加 · 马六甲海峡',
    body: '船队抵达马六甲。此地不久前刚建国，国王拜里米苏拉向明朝称臣，请求保护。郑和代表永乐帝册封其国王，赐银印、袍服，并在此设立「官厂」——一个集仓储、补给、贸易、情报于一体的海外基地。从此，马六甲从一个渔村崛起为海上丝路最繁荣的贸易枢纽，至今仍是全球最繁忙的海峡之一。',
    lat: 4.0, lng: 102.0, zoom: 5.5,
    route: ['quanzhou', 'palembang', 'malacca'],
    marker: 'malacca',
    showCities: ['quanzhou', 'palembang', 'malacca', 'colombo'],
    highlight: ['zheng-he-figure', 'malacca', 'porcelain', 'silk']
  },
  {
    title: '锡兰山之战',
    subtitle: '锡兰岛 · 科伦坡',
    body: '锡兰（今斯里兰卡）国王亚烈苦奈儿贪图船队财物，发兵五万围攻郑和船队。郑和出奇制胜——他敏锐地发现敌军倾巢而出，王城空虚，于是亲率两千精兵绕道直捣王城，一举攻破并生擒国王及家眷。永乐帝宽大为怀，释放了亚烈苦奈儿，另立新君。这一战震动了整个印度洋沿岸诸国，此后各国纷纷遣使来朝。',
    lat: 7.0, lng: 80.0, zoom: 6,
    route: ['quanzhou', 'malacca', 'colombo'],
    marker: 'colombo',
    showCities: ['quanzhou', 'malacca', 'colombo', 'calicut'],
    highlight: ['zheng-he-figure', 'colombo', 'buddhism']
  },
  {
    title: '香料海岸·卡利卡特',
    subtitle: '印度马拉巴尔海岸',
    body: '卡利卡特（古里）是印度洋最大的香料贸易中心，胡椒、丁香、豆蔻堆积如山，阿拉伯、波斯、印度商人云集。郑和在此设立贸易站，用丝绸和瓷器交换香料与宝石。翻译官马欢在《瀛涯胜览》中以亲历者视角记录下这里的热闹街市、独特风俗和精密的天文航海术——这是中国人第一次如此近距离地观察印度洋世界。',
    lat: 11.0, lng: 76.0, zoom: 6,
    route: ['colombo', 'calicut'],
    marker: 'calicut',
    showCities: ['colombo', 'calicut', 'quanzhou'],
    highlight: ['zheng-he-figure', 'ma-huan', 'spices', 'clove', 'pearls', 'porcelain']
  },
  {
    title: '阿拉伯·波斯湾之门',
    subtitle: '霍尔木兹 · 亚丁 · 吉达',
    body: '第四次远航，郑和舰队越过印度洋，直抵波斯湾门户霍尔木兹。这里珠宝、骏马、金银器皿取之不尽。随后的航行中，船队抵达阿拉伯半岛的亚丁和吉达，副使洪保率七人分队前往麦加（天方）朝觐，绘制了克尔白圣殿的地图带回中国。伊斯兰世界为东方巨舰所震撼——七十年后达伽马抵达印度时，他最大的船也不过郑和宝船的五分之一。',
    lat: 21.0, lng: 50.0, zoom: 4,
    route: ['calicut', 'hormuz', 'aden', 'jeddah'],
    marker: 'hormuz',
    showCities: ['calicut', 'hormuz', 'aden', 'jeddah', 'quanzhou'],
    highlight: ['zheng-he-figure', 'frankincense', 'myrrh', 'pearls', 'ivory']
  },
  {
    title: '麒麟入中华',
    subtitle: '东非海岸 · 摩加迪沙 → 蒙巴萨',
    body: '第五次远航，船队沿东非海岸南下，抵达摩加迪沙、蒙巴萨和麻林地（今马林迪）。麻林地国王向明朝进献长颈鹿——中国第一次见到这种动物，因其温顺的举止与传说中瑞兽麒麟相似，满朝为之轰动。郑和航海图精确标定了从长江口到东非海岸的全部航线与地标。1433年，62岁的郑和在第七次远航归途中病逝，海葬于印度洋。舰队虽已远去，但海上丝绸之路的航线从此被铭刻在世界航海史上。',
    lat: -1.0, lng: 43.0, zoom: 3.5,
    route: ['jeddah', 'aden', 'mogadishu', 'mombasa'],
    marker: 'mombasa',
    showCities: ['quanzhou', 'malacca', 'calicut', 'hormuz', 'aden', 'jeddah', 'mogadishu', 'mombasa'],
    highlight: ['zheng-he-figure', 'ivory', 'frankincense', 'coral', 'pearls']
  }
];

const TOTAL = STORY.length;

// ── Init Map ──
const map = L.map('map', {
  zoomControl: false, attributionControl: false,
  center: [15, 95], zoom: 3.5
});
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  maxZoom: 12
}).addTo(map);

let DATA = null;
let currentChapter = 0;
let routeLines = [];
let cityMarkers = [];
let highlightMarkers = [];

// ── Load data ──
fetch('data/silk-road.json').then(r => r.json()).then(d => {
  DATA = d;
  initProgress();
  renderChapter(0);
}).catch(() => {
  fetch('https://scarlettlab2026.github.io/silk-road-2026/data/silk-road.json')
    .then(r => r.json()).then(d => { DATA = d; initProgress(); renderChapter(0); });
});

// ── Progress dots ──
function initProgress() {
  const el = document.getElementById('progress');
  el.innerHTML = STORY.map((_, i) =>
    `<div class="dot${i===0?' active':''}" id="dot${i}"></div>`
  ).join('');
}

function updateProgress(idx) {
  for (let i = 0; i < TOTAL; i++) {
    const d = document.getElementById('dot'+i);
    if (!d) continue;
    d.className = 'dot' + (i === idx ? ' active' : i < idx ? ' done' : '');
  }
}

// ── Render chapter ──
function renderChapter(idx) {
  const ch = STORY[idx];
  currentChapter = idx;
  updateProgress(idx);

  document.getElementById('chNum').textContent = `第 ${idx+1} 章 / ${TOTAL}`;
  document.getElementById('chTitle').textContent = ch.subtitle;
  document.getElementById('chBody').textContent = ch.body;

  const card = document.getElementById('narrative');
  card.classList.add('fading');
  setTimeout(() => {
    card.classList.remove('fading');
  }, 200);

  document.querySelector('#narrative .hint').innerHTML =
    idx < TOTAL - 1
      ? '<span class="arrow">→</span> 点击继续'
      : '<span style="font-size:1rem">🚢</span> 点击重播';

  map.flyTo([ch.lat, ch.lng], ch.zoom, { duration: 1.8, easeLinearity: 0.25 });

  routeLines.forEach(l => map.removeLayer(l)); routeLines = [];
  cityMarkers.forEach(m => map.removeLayer(m)); cityMarkers = [];
  highlightMarkers.forEach(m => map.removeLayer(m)); highlightMarkers = [];

  if (ch.route && DATA) {
    const pts = [];
    ch.route.forEach(nid => {
      const c = DATA.nodes.cities.find(cc => cc.id === nid);
      if (c) pts.push([c.lat, c.lng]);
    });
    if (pts.length >= 2) {
      const dimLine = L.polyline(pts, {
        color: 'rgba(94,163,184,0.15)', weight: 2, dashArray: '8 6'
      }).addTo(map);
      routeLines.push(dimLine);
      const brightLine = L.polyline(pts, {
        color: 'rgba(94,163,184,0.8)', weight: 3.5, dashArray: '12 4'
      }).addTo(map);
      routeLines.push(brightLine);
    }
  }

  if (ch.showCities && DATA) {
    ch.showCities.forEach(nid => {
      const c = DATA.nodes.cities.find(cc => cc.id === nid);
      if (!c) return;
      const isKey = nid === ch.marker || ch.highlight.includes(nid);
      const isStart = nid === 'quanzhou' || nid === 'guangzhou';
      const m = L.circleMarker([c.lat, c.lng], {
        radius: isStart ? 8 : isKey ? 7 : 5,
        fillColor: isStart ? '#fff' : 'var(--accent, #5ea3b8)',
        color: '#0a1014', weight: 1.5, fillOpacity: isKey ? 1 : 0.7
      }).addTo(map);
      m.bindTooltip(c.name, {
        direction: 'top', offset: [0, -6],
        className: 'story-tooltip'
      });
      cityMarkers.push(m);
    });
  }

  if (ch.marker && DATA) {
    const c = DATA.nodes.cities.find(cc => cc.id === ch.marker);
    if (c) {
      const pulse = L.circleMarker([c.lat, c.lng], {
        radius: 14, fillColor: 'rgba(255,255,255,0.25)',
        color: 'transparent', fillOpacity: 0.6
      }).addTo(map);
      highlightMarkers.push(pulse);
      const center = L.circleMarker([c.lat, c.lng], {
        radius: 8, fillColor: '#fff', color: '#0a1014', weight: 2, fillOpacity: 1
      }).addTo(map);
      highlightMarkers.push(center);
    }
  }

  const badgeRow = document.getElementById('badges');
  if (ch.highlight && DATA) {
    const colors = { figure: '#5b9bd5', goods: '#6aad6a', event: '#c75b3a' };
    badgeRow.innerHTML = ch.highlight.filter(id => id !== (ch.marker || '')).map(eid => {
      let entity = null, cat = '';
      for (const c of ['figures','goods','events']) {
        entity = DATA.nodes[c].find(n => n.id === eid);
        if (entity) { cat = c === 'figures' ? 'figure' : c === 'goods' ? 'goods' : 'event'; break; }
      }
      if (!entity) return '';
      const color = colors[cat];
      const label = entity.type || entity.category || entity.dynasty || '';
      return `<span style="display:inline-block;padding:4px 10px;margin:2px;border-radius:10px;font-size:0.73rem;border:1px solid ${color};color:${color};background:rgba(255,255,255,0.03)"><strong>${entity.name}</strong> <span style="opacity:0.7">${label}</span></span>`;
    }).join('');
  } else {
    badgeRow.innerHTML = '';
  }
}

function toggleCard() {
  const card = document.getElementById('narrative');
  const btn = document.getElementById('toggle-card');
  card.classList.toggle('collapsed');
  btn.textContent = card.classList.contains('collapsed') ? '＋' : '─';
}

function advance() {
  const card = document.getElementById('narrative');
  if (card.classList.contains('collapsed')) {
    toggleCard();
    return;
  }
  if (currentChapter < TOTAL - 1) {
    renderChapter(currentChapter + 1);
  } else {
    restart();
  }
}

function restart() {
  routeLines.forEach(l => map.removeLayer(l)); routeLines = [];
  cityMarkers.forEach(m => map.removeLayer(m)); cityMarkers = [];
  highlightMarkers.forEach(m => map.removeLayer(m)); highlightMarkers = [];
  renderChapter(0);
}

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === ' ' || e.code === 'Space') {
    e.preventDefault(); advance();
  }
  if (e.key === 'ArrowLeft') {
    e.preventDefault();
    if (currentChapter > 0) renderChapter(currentChapter - 1);
  }
});
</script>
</body>
</html>
