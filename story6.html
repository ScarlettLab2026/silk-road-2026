<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>万里俘踪 · 杜环经行记</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
  :root {
    --bg: #0d0c0a; --card-bg: rgba(20,17,13,0.93); --accent: #b08040;
    --text: #e6ddd0; --text-dim: #9b8d78; --border: rgba(255,255,255,0.08);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background: #000; font-family: -apple-system, "PingFang SC", "Noto Serif SC", "Microsoft YaHei", serif; overflow: hidden; height: 100vh; }

  #map { position: fixed; inset: 0; z-index: 1; }
  .leaflet-container { background: #0d0c0a; }

  /* ── Story Nav ── */
  #story-nav {
    position: fixed; top: 24px; left: 50%; transform: translateX(-50%);
    z-index: 10; display: flex; gap: 0; font-size: 0.7rem;
  }
  #story-nav a {
    padding: 4px 10px; text-decoration: none; color: var(--text-dim);
    border: 1px solid var(--border); background: rgba(0,0,0,0.3);
    transition: all 0.2s; white-space: nowrap;
  }
  #story-nav a:first-child { border-radius: 14px 0 0 14px; }
  #story-nav a:last-child { border-radius: 0 14px 14px 0; }
  #story-nav a.active { color: var(--accent); border-color: var(--accent); background: rgba(176,128,64,0.1); }
  #story-nav a:hover:not(.active) { color: #fff; background: rgba(255,255,255,0.06); }

  /* ── Narrative Card ── */
  #narrative {
    position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%);
    z-index: 10; width: min(92vw, 620px);
    background: var(--card-bg); border: 1px solid var(--border);
    border-radius: 20px; padding: 32px 36px 28px;
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    box-shadow: 0 8px 48px rgba(0,0,0,0.5);
    transition: opacity 0.5s, transform 0.5s;
    cursor: pointer; user-select: none;
  }
  #narrative.fading { opacity: 0; transform: translateX(-50%) translateY(20px); }
  #narrative.collapsed { padding: 12px 24px; }
  #narrative.collapsed p,
  #narrative.collapsed #badges { display: none; }
  #narrative.collapsed h2 { font-size: 0.95rem; margin-bottom: 0; }
  #narrative.collapsed .chapter-num { margin-bottom: 0; }
  #narrative.collapsed .hint { margin-top: 0; margin-left: 12px; display: inline-flex; }
  #toggle-card {
    position: absolute; top: 10px; right: 16px;
    background: none; border: none; color: var(--text-dim);
    font-size: 1.1rem; cursor: pointer; z-index: 2; padding: 2px 8px;
    line-height: 1; transition: color 0.2s;
  }
  #toggle-card:hover { color: #fff; }
  #narrative.collapsed #toggle-card { top: 50%; transform: translateY(-50%); }
  #narrative .chapter-num {
    font-size: 0.7rem; letter-spacing: 0.2em; color: var(--accent);
    text-transform: uppercase; margin-bottom: 6px;
  }
  #narrative h2 {
    font-size: 1.5rem; font-weight: 700; color: #fff;
    margin-bottom: 12px; letter-spacing: 0.04em; line-height: 1.4;
  }
  #narrative p {
    font-size: 1rem; line-height: 1.85; color: var(--text);
    margin-bottom: 6px;
  }
  #narrative .hint {
    margin-top: 18px; font-size: 0.78rem; color: var(--text-dim);
    display: flex; align-items: center; gap: 8px;
  }
  #narrative .hint .arrow { animation: bounce 1.2s infinite; }
  @keyframes bounce { 0%,100%{transform:translateX(0)} 50%{transform:translateX(6px)} }

  /* ── Progress Dots ── */
  #progress {
    position: fixed; top: 60px; left: 50%; transform: translateX(-50%);
    z-index: 10; display: flex; gap: 10px;
  }
  #progress .dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: rgba(255,255,255,0.2); transition: all 0.4s;
  }
  #progress .dot.active { background: var(--accent); transform: scale(1.4); }
  #progress .dot.done { background: rgba(176,128,64,0.5); }

  /* ── Nav buttons ── */
  #restart {
    position: fixed; top: 24px; right: 24px; z-index: 10;
    background: rgba(255,255,255,0.06); border: 1px solid var(--border);
    color: var(--text-dim); padding: 8px 16px; border-radius: 20px;
    font-size: 0.78rem; cursor: pointer; transition: all 0.3s;
  }
  #restart:hover { background: rgba(255,255,255,0.12); color: #fff; }
  #back {
    position: fixed; top: 24px; left: 24px; z-index: 10;
    background: rgba(255,255,255,0.06); border: 1px solid var(--border);
    color: var(--text-dim); padding: 8px 16px; border-radius: 20px;
    font-size: 0.78rem; cursor: pointer; transition: all 0.3s;
    text-decoration: none;
  }
  #back:hover { background: rgba(255,255,255,0.12); color: #fff; }

  @media (max-width: 640px) {
    #narrative { bottom: 16px; padding: 24px 20px 20px; border-radius: 16px; }
    #narrative h2 { font-size: 1.2rem; }
    #narrative p { font-size: 0.9rem; }
    #story-nav a { padding: 3px 7px; font-size: 0.64rem; }
  }
</style>
</head>
<body>

<div id="map"></div>

<div id="story-nav">
  <a href="story.html">📖 张骞</a>
  <a href="story4.html">🪷 法显</a>
  <a href="story3.html">🧘 玄奘</a>
  <a href="story2.html">🚢 郑和</a>
  <a href="story5.html">🏛 马可·波罗</a>
  <a href="story6.html" class="active">🏜 杜环</a>
</div>

<div id="progress"></div>

<a href="index.html" id="back">← 返回地图</a>
<button id="restart" onclick="restart()">🔄 重播</button>

<div id="narrative" onclick="advance()">
  <button id="toggle-card" onclick="event.stopPropagation();toggleCard()" title="收起/展开">─</button>
  <div class="chapter-num" id="chNum"></div>
  <h2 id="chTitle"></h2>
  <p id="chBody"></p>
  <div id="badges" style="margin:8px 0 0;line-height:1.8"></div>
  <div class="hint"><span class="arrow">→</span> 点击继续</div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const STORY = [
  {
    title: '怛罗斯之俘',
    subtitle: '公元751年 · 怛罗斯',
    body: '天宝十年，大唐安西节度使高仙芝率军深入中亚，在怛罗斯河畔与阿拉伯帝国（大食）的阿拔斯军队相遇。这是一场决定了世界文明走向的战役。唐军因葛逻禄部叛变而溃败，数千唐军被俘。俘虏中有一个名叫杜环的年轻人——他既非将军也非使臣，只是一个随军西行的普通文人。阿拉伯人没有杀他。他们把他和其他俘虏一起，押往帝国的腹地。杜环不知道等待他的是什么。他不知道这一去就是十一年。更不知道——他即将成为第一位亲眼见证伊斯兰世界、并留下文字记录的中国人。',
    lat: 42.8, lng: 71.3, zoom: 5,
    route: ['samarkand'],
    marker: null,
    showCities: ['samarkand', 'kashgar', 'balkh'],
    highlight: ['du-huan', 'battle-of-talas', 'du-huan-travels']
  },
  {
    title: '撒马尔罕的新世界',
    subtitle: '中亚 · 撒马尔罕',
    body: '阿拉伯军队将俘虏编入后勤队伍，杜环随军穿越河中地区，抵达撒马尔罕——当时伊斯兰世界最东端的文明重镇。他震惊地发现，这座城里竟聚居着一批被俘的唐朝工匠，他们正在开办造纸作坊。正是这些俘虏，将造纸术首次带到了伊斯兰世界。杜环后来在《经行记》中写道：「绫绢机杼，金银匠、画匠，汉匠起作。画者，京兆人樊淑、刘泚；织络者，河东人乐怀、吕礼。」——他记下了每一个同胞的名字。在陌生的异教徒城市里，中国工匠的手艺正在改变世界。',
    lat: 39.6, lng: 66.9, zoom: 5.2,
    route: ['samarkand'],
    marker: 'samarkand',
    showCities: ['samarkand', 'bukhara', 'balkh'],
    highlight: ['du-huan', 'paper', 'du-huan-travels', 'paper-spread-west']
  },
  {
    title: '阿拔斯的腹地',
    subtitle: '阿拉伯帝国 · 库法 / 巴格达',
    body: '离开撒马尔罕，杜环随阿拉伯军队进入阿拔斯王朝的腹地——两河流域。此时距阿拔斯革命（750年）仅过去数年，新都巴格达（762年由哈里发曼苏尔下令兴建，恰是杜环归国之年）刚刚在底格里斯河畔破土。杜环实际见到的阿拔斯中枢是库法一带的行政中心。他看到了什么？驿道系统四通八达，市场里流通着从中国到非洲的货物。杜环在《经行记》中记录了大食（阿拉伯）的物产：椰枣、乳香、没药、犀角、象牙、珠宝——他的目光始终是商人的目光、文人的笔触。他还记录了阿拉伯人的饮食、服饰、婚丧嫁娶。最惊人的是——他记录了伊斯兰教的信仰体系和礼拜制度。一千三百年后，这些文字仍然是中国最早、最准确的伊斯兰教现场观察。',
    lat: 33.3, lng: 44.4, zoom: 5,
    route: ['samarkand', 'baghdad'],
    marker: 'baghdad',
    showCities: ['samarkand', 'baghdad', 'damascus'],
    highlight: ['du-huan', 'baghdad', 'frankincense', 'myrrh']
  },
  {
    title: '大食法与伊斯兰',
    subtitle: '阿拉伯帝国 · 大马士革',
    body: '随阿拉伯军队和商队西行，杜环抵达了大马士革。这座城市是倭马亚王朝的旧都，拥有宏伟的倭马亚清真寺和繁荣的市场。在这里，杜环对伊斯兰教做了中国历史上第一次系统性记录。他在《经行记》中写道：「大食法者，不食猪狗驴马等肉，不拜国王父母之尊，不信鬼神，唯拜天（Allah）。大食王每七日一礼拜，登高座为众说法。一日五时礼天。」——日五次礼拜、周五聚礼、不吃猪肉、不拜偶像，准确到令人惊叹。他的记录比后来宋代的《岭外代答》早了三百多年，比明代的《瀛涯胜览》早了六百年。一个战俘，做出了中国最早的比较宗教学田野调查。',
    lat: 33.5, lng: 36.3, zoom: 5.5,
    route: ['samarkand', 'baghdad', 'damascus'],
    marker: 'damascus',
    showCities: ['baghdad', 'damascus', 'mecca'],
    highlight: ['du-huan', 'islam-eastward-spread', 'du-huan-travels']
  },
  {
    title: '摩邻国·非洲见闻',
    subtitle: '东非 · 摩邻国',
    body: '离开大马士革后，杜环随阿拉伯商队继续南下。他到达了一个叫「摩邻国」的地方。关于摩邻国在哪，学界争论至今——有说是肯尼亚的马林迪，有说是摩洛哥，也有说是索马里的摩加迪沙。无论哪种说法，杜环都是第一位留下非洲文字记录的中国人。他在《经行记》里写道：「摩邻国，在勃萨罗国西南，渡大碛，行二千里至其国。其人黑，其俗犷。少五谷，食肉。无衣服，唯以羊皮遮形。」——对撒哈拉以南非洲人民肤色、气候、饮食和服饰的观察，在中国文献史上是第一次。杜环此时离开唐土已近十年。没有同伴、没有使命、没有归期。但他一直在记录。',
    lat: -3.0, lng: 39.0, zoom: 5,
    route: ['samarkand', 'baghdad', 'damascus', 'mombasa'],
    marker: 'mombasa',
    showCities: ['mombasa', 'aden', 'mecca'],
    highlight: ['du-huan', 'ivory', 'frankincense']
  },
  {
    title: '麦加·天房之前',
    subtitle: '阿拉伯半岛 · 麦加（存疑）',
    body: '从非洲折返阿拉伯半岛后，杜环到达了一座他称为"大食王都城"的城市。杜环笔下的这座城市究竟是哪里，学术界有两种解读：多数学者根据"城内有天房（Kaaba）"的记载，认为他确实到达了麦加——这使他成为第一位留下麦加记录的中文作者。但也有学者指出，经文"大食王号暮门（Amir al-Mu\'minin，信士的长官），都此处"——哈里发的"首都"从来不在麦加，因此杜环描述的也可能是库法的大清真寺。《经行记》记载：「大食王号暮门，都此处。其城方十五里，城内有天房。」他还描述了聚礼的仪式：「七日一王出礼拜，登高座，为众说法。」无论杜环到达的究竟是麦加还是库法，他笔下的这座城市连接着红海与印度洋贸易圈——阿拉伯商船从亚丁港起航，带着乳香、没药、象牙，驶向印度和更远的东方。杜环或许就在某个阿拉伯港口找到了回家的路——搭乘一艘前往中国的阿拉伯商船。',
    lat: 22.0, lng: 41.0, zoom: 5,
    route: ['samarkand', 'baghdad', 'damascus', 'mombasa', 'mecca'],
    marker: 'mecca',
    showCities: ['mecca', 'jeddah', 'aden', 'hormuz'],
    highlight: ['du-huan', 'ibn-battuta-journey', 'frankincense']
  },
  {
    title: '归航·失落的经行记',
    subtitle: '公元762年 · 广州',
    body: '唐代宗宝应元年（762年），杜环在阿拉伯帝国漂泊了十一年后，搭乘一艘阿拉伯商船从波斯湾启航。经印度洋、马六甲海峡、南海——全程走海上丝路——终于回到了中国。船在广州港靠岸。他踏上故土的那一刻，距离怛罗斯那场改变命运的战役，已经过去了整整十一年。回到中国后，杜环写了一本书——《经行记》。记录了他亲眼所见的阿拉伯帝国、伊斯兰教、非洲和沿途风土。这是全世界第一本由中国人在伊斯兰世界完成的实地考察笔记。可惜，原书在宋代以后失传了。我们今天能读到的，只有唐代杜佑《通典》中引用的1511个字。区区一千五百字，却涵盖了地理、宗教、物产、风俗、政治——每一个字都是从十一年的漂泊里蒸馏出来的。杜佑在《通典》里引用时写道：「杜环《经行记》云……」——他不知道，自己正在拯救中国历史上最珍贵的域外见闻录。一千三百年后，当我们谈起「最早到达非洲的中国人」时，答案是一个战俘的名字。他没有选择出发。但他选择了记录。',
    lat: 15.0, lng: 70.0, zoom: 3,
    route: ['samarkand', 'baghdad', 'damascus', 'mombasa', 'mecca', 'guangzhou'],
    marker: 'guangzhou',
    showCities: ['guangzhou', 'quanzhou', 'mecca', 'baghdad'],
    highlight: ['du-huan', 'du-huan-travels', 'guangzhou-maritime-route', 'paper']
  }
];

const TOTAL = STORY.length;

const map = L.map('map', {
  zoomControl: false, attributionControl: false,
  center: [35, 55], zoom: 3
});
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  maxZoom: 12
}).addTo(map);

let DATA = null;
let currentChapter = 0;
let routeLines = [];
let cityMarkers = [];
let highlightMarkers = [];

fetch('data/silk-road.json').then(r => r.json()).then(d => {
  DATA = d;
  initProgress();
  renderChapter(0);
}).catch(() => {
  fetch('https://scarlettlab2026.github.io/silk-road-2026/data/silk-road.json')
    .then(r => r.json()).then(d => { DATA = d; initProgress(); renderChapter(0); });
});

function initProgress() {
  const el = document.getElementById('progress');
  el.innerHTML = STORY.map((_, i) =>
    `<div class="dot${i===0?' active':''}" id="dot${i}"></div>`
  ).join('');
}

function updateProgress(idx) {
  for (let i = 0; i < TOTAL; i++) {
    const d = document.getElementById('dot'+i);
    if (!d) continue;
    d.className = 'dot' + (i === idx ? ' active' : i < idx ? ' done' : '');
  }
}

function renderChapter(idx) {
  const ch = STORY[idx];
  currentChapter = idx;
  updateProgress(idx);

  document.getElementById('chNum').textContent = `第 ${idx+1} 章 / ${TOTAL}`;
  document.getElementById('chTitle').textContent = ch.subtitle;
  document.getElementById('chBody').textContent = ch.body;

  const card = document.getElementById('narrative');
  card.classList.add('fading');
  setTimeout(() => { card.classList.remove('fading'); }, 200);

  document.querySelector('#narrative .hint').innerHTML =
    idx < TOTAL - 1
      ? '<span class="arrow">→</span> 点击继续'
      : '<span style="font-size:1rem">🏜</span> 点击重播';

  map.flyTo([ch.lat, ch.lng], ch.zoom, { duration: 1.8, easeLinearity: 0.25 });

  routeLines.forEach(l => map.removeLayer(l)); routeLines = [];
  cityMarkers.forEach(m => map.removeLayer(m)); cityMarkers = [];
  highlightMarkers.forEach(m => map.removeLayer(m)); highlightMarkers = [];

  if (ch.route && DATA) {
    const pts = [];
    ch.route.forEach(nid => {
      const c = DATA.nodes.cities.find(cc => cc.id === nid);
      if (c) pts.push([c.lat, c.lng]);
    });
    if (pts.length >= 2) {
      routeLines.push(L.polyline(pts, {
        color: 'rgba(176,128,64,0.12)', weight: 2, dashArray: '8 6'
      }).addTo(map));
      routeLines.push(L.polyline(pts, {
        color: 'rgba(176,128,64,0.8)', weight: 3.5, dashArray: '12 4'
      }).addTo(map));
    }
  }

  if (ch.showCities && DATA) {
    ch.showCities.forEach(nid => {
      const c = DATA.nodes.cities.find(cc => cc.id === nid);
      if (!c) return;
      const isKey = nid === ch.marker || (ch.highlight && ch.highlight.includes(nid));
      const isStart = nid === 'samarkand' || nid === 'guangzhou';
      const m = L.circleMarker([c.lat, c.lng], {
        radius: isStart ? 8 : isKey ? 7 : 5,
        fillColor: isStart ? '#fff' : 'var(--accent, #b08040)',
        color: '#0d0c0a', weight: 1.5, fillOpacity: isKey ? 1 : 0.7
      }).addTo(map);
      m.bindTooltip(c.name, { direction: 'top', offset: [0, -6] });
      cityMarkers.push(m);
    });
  }

  if (ch.marker && DATA) {
    const c = DATA.nodes.cities.find(cc => cc.id === ch.marker);
    if (c) {
      highlightMarkers.push(L.circleMarker([c.lat, c.lng], {
        radius: 14, fillColor: 'rgba(255,255,255,0.25)',
        color: 'transparent', fillOpacity: 0.6
      }).addTo(map));
      highlightMarkers.push(L.circleMarker([c.lat, c.lng], {
        radius: 8, fillColor: '#fff', color: '#0d0c0a', weight: 2, fillOpacity: 1
      }).addTo(map));
    }
  }

  const badgeRow = document.getElementById('badges');
  if (ch.highlight && DATA) {
    const colors = { figure: '#5b9bd5', goods: '#6aad6a', event: '#c75b3a' };
    badgeRow.innerHTML = ch.highlight.filter(id => id !== (ch.marker || '')).map(eid => {
      let entity = null, cat = '';
      for (const c of ['figures','goods','events']) {
        entity = DATA.nodes[c].find(n => n.id === eid);
        if (entity) { cat = c === 'figures' ? 'figure' : c === 'goods' ? 'goods' : 'event'; break; }
      }
      if (!entity) return '';
      const color = colors[cat];
      const label = entity.type || entity.category || entity.dynasty || '';
      return `<span style="display:inline-block;padding:4px 10px;margin:2px;border-radius:10px;font-size:0.73rem;border:1px solid ${color};color:${color};background:rgba(255,255,255,0.03)"><strong>${entity.name}</strong> <span style="opacity:0.7">${label}</span></span>`;
    }).join('');
  } else {
    badgeRow.innerHTML = '';
  }
}

function toggleCard() {
  const card = document.getElementById('narrative');
  const btn = document.getElementById('toggle-card');
  card.classList.toggle('collapsed');
  btn.textContent = card.classList.contains('collapsed') ? '＋' : '─';
}

function advance() {
  const card = document.getElementById('narrative');
  if (card.classList.contains('collapsed')) {
    toggleCard();
    return;
  }
  if (currentChapter < TOTAL - 1) {
    renderChapter(currentChapter + 1);
  } else {
    restart();
  }
}

function restart() {
  routeLines.forEach(l => map.removeLayer(l)); routeLines = [];
  cityMarkers.forEach(m => map.removeLayer(m)); cityMarkers = [];
  highlightMarkers.forEach(m => map.removeLayer(m)); highlightMarkers = [];
  renderChapter(0);
}

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === ' ' || e.code === 'Space') {
    e.preventDefault(); advance();
  }
  if (e.key === 'ArrowLeft') {
    e.preventDefault();
    if (currentChapter > 0) renderChapter(currentChapter - 1);
  }
});
</script>
</body></html>
